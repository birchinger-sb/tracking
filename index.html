<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>BSB Tracking</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#231F20">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="48x48" href="favicon-48.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="BSB Tracking">
<style>
  :root{
    --bg:#F1EFEC;
    --panel:#FFFFFF;
    --ink:#231F20;          /* BSB-Schwarz (CI) */
    --ink-2:#5C5759;
    --ink-3:#948F90;
    --line:#DBD7D3;
    --line-2:#ECE9E5;
    --steel:#231F20;        /* Primär = CI-Schwarz */
    --steel-2:#3D3839;
    --hivis:#231F20;
    --hivis-ink:#231F20;
    --ok:#2C7A4B;
    --warn:#B23B1E;
    --weekend:#F5F3F0;
    --today:#231F20;
    --shadow:0 1px 2px rgba(20,23,28,.06), 0 8px 24px rgba(20,23,28,.08);
    --mono:ui-monospace,"SF Mono","Cascadia Mono","Roboto Mono","JetBrains Mono",Menlo,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --day-w:44px;
    --name-w:210px;
    --radius:10px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg);color:var(--ink);font-family:var(--sans);
    font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;
    display:flex;flex-direction:column;min-height:100dvh;
  }
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:14px}

  /* ---------- Kopfzeile ---------- */
  header{
    background:var(--panel);color:var(--ink);display:flex;align-items:center;gap:16px;
    padding:0 16px;height:62px;flex:0 0 auto;position:sticky;top:0;z-index:40;
    border-bottom:1px solid var(--line);
  }
  .brand{display:flex;align-items:center;gap:13px;text-decoration:none;color:inherit}
  .brand .logo{display:block;height:40px;color:var(--ink)}
  .brand .logo-svg{height:40px;width:auto;display:block}
  .brand-div{width:1px;height:30px;background:var(--line);flex:0 0 auto}
  .brand-label{font-weight:700;font-size:14px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink)}
  nav.tabs{display:flex;gap:2px;margin-left:6px}
  nav.tabs button{
    background:transparent;border:0;color:var(--ink-2);padding:8px 14px;border-radius:8px;
    font-weight:600;font-size:13px;transition:background .12s,color .12s;
  }
  nav.tabs button:hover{background:var(--bg);color:var(--ink)}
  nav.tabs button[aria-selected="true"]{background:var(--ink);color:#fff}
  .head-right{margin-left:auto;display:flex;align-items:center;gap:10px}
  .sync{
    display:flex;align-items:center;gap:8px;background:var(--panel);
    border:1px solid var(--line);border-radius:999px;padding:5px 12px 5px 10px;
    font-size:12px;color:var(--ink-2);cursor:pointer;font-weight:500;
  }
  .sync:hover{border-color:var(--ink-3)}
  .sync .dot{width:9px;height:9px;border-radius:50%;background:var(--ink-3);flex:0 0 auto}
  .sync.s-saved .dot,.sync.s-connected .dot{background:var(--ok);box-shadow:0 0 0 3px rgba(44,122,75,.22)}
  .sync.s-saving .dot,.sync.s-loading .dot{background:var(--ink);animation:pulse 1s infinite}
  .sync.s-error .dot{background:var(--warn)}
  .sync.s-off .dot{background:var(--ink-3)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
  .icon-btn{
    background:var(--panel);border:1px solid var(--line);color:var(--ink-2);
    width:36px;height:36px;border-radius:8px;display:grid;place-items:center;font-size:16px;
  }
  .icon-btn:hover{border-color:var(--ink-3);color:var(--ink)}

  /* ---------- Verbindungs-Banner ---------- */
  .banner{
    background:#F6F1E8;border-bottom:1px solid #E5DACA;color:#6E6457;
    padding:9px 16px;font-size:13px;display:flex;align-items:center;gap:10px;flex:0 0 auto;
  }
  .banner b{color:var(--ink)}
  .banner button{
    margin-left:auto;background:var(--steel);color:#fff;border:0;border-radius:7px;
    padding:6px 12px;font-weight:600;font-size:12px;
  }

  /* ---------- Werkzeugleiste ---------- */
  .toolbar{
    background:var(--panel);border-bottom:1px solid var(--line);
    padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex:0 0 auto;
  }
  .nav-range{display:flex;align-items:center;gap:2px;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:2px}
  .nav-range button{background:transparent;border:0;padding:6px 10px;border-radius:6px;font-weight:600;color:var(--ink-2)}
  .nav-range button:hover{background:#fff}
  .nav-range .today-btn{color:var(--steel)}
  .seg{display:inline-flex;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:2px}
  .seg button{background:transparent;border:0;padding:6px 11px;border-radius:6px;font-weight:600;font-size:13px;color:var(--ink-2)}
  .seg button[aria-pressed="true"]{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.08)}
  .field{display:flex;align-items:center;gap:7px;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:0 10px;height:36px}
  .field input,.field select{border:0;background:transparent;outline:none;color:var(--ink);height:34px}
  .field input::placeholder{color:var(--ink-3)}
  .spacer{flex:1}
  .btn{
    border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:8px;
    padding:8px 13px;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:7px;
  }
  .btn:hover{border-color:var(--ink-3)}
  .btn.primary{background:var(--steel);border-color:var(--steel);color:#fff}
  .btn.primary:hover{background:var(--steel-2)}
  .btn.amber{background:var(--steel);border-color:var(--steel);color:#fff}
  .btn.amber:hover{background:var(--steel-2)}
  .btn.ghost{background:transparent;border-color:transparent;color:var(--ink-2)}
  .btn.danger{color:var(--warn);border-color:#eccabf}
  .btn.danger:hover{background:#fdf2ee}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  /* ---------- Inhaltsbereich ---------- */
  main{flex:1;min-height:0;display:flex;flex-direction:column}
  .view{flex:1;min-height:0;display:none;flex-direction:column}
  .view.active{display:flex}

  /* ---------- Zeitstrahl ---------- */
  .timeline{flex:1;min-height:0;overflow:auto;background:var(--panel);position:relative}
  .tl-grid{display:grid;min-width:max-content}
  .tl-corner{
    position:sticky;left:0;top:0;z-index:30;background:var(--panel);
    border-right:2px solid var(--line);border-bottom:1px solid var(--line);
    width:var(--name-w);min-width:var(--name-w);display:flex;align-items:center;
    padding:0 14px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);
    white-space:nowrap;overflow:hidden;
  }
  .tl-head{position:sticky;top:0;z-index:20;display:flex;background:var(--panel);border-bottom:1px solid var(--line)}
  .tl-day{
    width:var(--day-w);min-width:var(--day-w);flex:0 0 var(--day-w);
    padding:6px 0 5px;text-align:center;border-left:1px solid var(--line-2);
    font-family:var(--mono);
  }
  .tl-day.weekend{background:var(--weekend)}
  .tl-day .dow{font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.03em}
  .tl-day .dnum{font-size:13px;font-weight:600;color:var(--ink-2);font-variant-numeric:tabular-nums}
  .tl-day.today{background:rgba(35,31,32,.06)}
  .tl-day.today .dnum{color:var(--hivis-ink)}
  .tl-day.month-start{border-left:2px solid var(--ink-3)}
  .tl-day .mon{font-size:9px;color:var(--steel);font-weight:700;height:11px}

  .tl-rowname{
    position:sticky;left:0;z-index:10;background:var(--panel);
    border-right:2px solid var(--line);border-bottom:1px solid var(--line-2);
    width:var(--name-w);min-width:var(--name-w);padding:8px 12px;display:flex;align-items:center;gap:10px;
  }
  .tl-rowname .swatch{width:11px;height:11px;border-radius:3px;flex:0 0 auto}
  .tl-rowname .nm{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tl-rowname .tp{font-size:11px;color:var(--ink-3);font-family:var(--mono)}
  .tl-track{
    position:relative;border-bottom:1px solid var(--line-2);
    background-image:repeating-linear-gradient(to right, transparent 0, transparent calc(var(--day-w) - 1px), var(--line-2) calc(var(--day-w) - 1px), var(--line-2) var(--day-w));
    cursor:copy;
  }
  .tl-track .wk{position:absolute;top:0;bottom:0;background:var(--weekend);opacity:.7;pointer-events:none}
  .tl-track .today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--today);pointer-events:none;z-index:2}
  .bar{
    position:absolute;height:24px;border-radius:6px;display:flex;align-items:center;
    padding:0 8px;color:#fff;font-size:12px;font-weight:600;overflow:hidden;white-space:nowrap;
    box-shadow:0 1px 2px rgba(0,0,0,.18);cursor:pointer;z-index:3;
    text-shadow:0 1px 1px rgba(0,0,0,.25);border:1px solid rgba(0,0,0,.08);
  }
  .bar:hover{filter:brightness(1.08);box-shadow:0 2px 8px rgba(0,0,0,.25)}
  .bar .loc{overflow:hidden;text-overflow:ellipsis}
  .bar.conflict{box-shadow:0 0 0 2px var(--warn),0 1px 2px rgba(0,0,0,.2)}
  .bar .clip-l{border-top-left-radius:0;border-bottom-left-radius:0}
  .empty-tl{padding:50px 20px;text-align:center;color:var(--ink-3);position:sticky;left:0;max-width:520px;margin:0 auto}
  .empty-tl h3{color:var(--ink-2);margin:0 0 6px}

  /* ---------- Listen / Karten ---------- */
  .scroll{flex:1;min-height:0;overflow:auto;padding:18px 16px 60px}
  .wrap{max-width:980px;margin:0 auto}
  .section-h{display:flex;align-items:center;gap:10px;margin:4px 2px 14px}
  .section-h h2{font-size:16px;margin:0}
  .count{font-size:12px;color:var(--ink-3);background:var(--bg);border:1px solid var(--line);border-radius:999px;padding:2px 9px;font-family:var(--mono)}

  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}
  .card .top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .card .swatch{width:14px;height:14px;border-radius:4px;flex:0 0 auto}
  .card .nm{font-weight:700;font-size:15px}
  .card .badge{margin-left:auto;font-size:11px;font-family:var(--mono);color:var(--ink-2);background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:2px 7px}
  .card .meta{font-size:13px;color:var(--ink-2);display:grid;gap:4px}
  .card .meta .k{color:var(--ink-3);font-size:11px;text-transform:uppercase;letter-spacing:.04em}
  .card .row-actions{display:flex;gap:6px;margin-top:12px;padding-top:11px;border-top:1px solid var(--line-2)}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-family:var(--mono);padding:2px 8px;border-radius:999px;border:1px solid var(--line)}
  .pill.now{background:#e9f6ee;border-color:#bfe3cd;color:#176a3a}
  .pill.soon{background:#F4EFE6;border-color:#E3D8C6;color:#6E6457}
  .pill.past{background:var(--bg);color:var(--ink-3)}

  .blist{display:grid;gap:9px}
  .brow{
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:12px 14px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);
  }
  .brow .bar-swatch{width:6px;align-self:stretch;border-radius:3px;flex:0 0 auto}
  .brow .b-main{min-width:0;flex:1}
  .brow .b-loc{font-weight:700;font-size:14px}
  .brow .b-asset{font-size:12px;color:var(--ink-2)}
  .brow .b-when{font-family:var(--mono);font-size:13px;text-align:right;color:var(--ink-2);white-space:nowrap}
  .brow .b-when .days{font-size:11px;color:var(--ink-3)}
  .brow .b-actions{display:flex;gap:6px}
  .day-divider{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);margin:14px 2px 4px}
  .empty-state{text-align:center;color:var(--ink-3);padding:60px 20px}
  .empty-state h3{color:var(--ink-2);margin:0 0 6px}

  /* ---------- Modal ---------- */
  .overlay{position:fixed;inset:0;background:rgba(14,17,22,.5);backdrop-filter:blur(2px);z-index:60;display:none;align-items:flex-start;justify-content:center;padding:24px 16px;overflow:auto}
  .overlay.show{display:flex}
  .modal{background:var(--panel);border-radius:14px;box-shadow:0 24px 60px rgba(0,0,0,.32);width:100%;max-width:520px;margin:auto;overflow:hidden;animation:pop .14s ease-out}
  @keyframes pop{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}
  .modal h2{margin:0;font-size:17px}
  .modal-head{padding:16px 18px;border-bottom:1px solid var(--line-2);display:flex;align-items:center;gap:10px}
  .modal-head .close{margin-left:auto;background:none;border:0;font-size:20px;color:var(--ink-3);width:30px;height:30px;border-radius:7px}
  .modal-head .close:hover{background:var(--bg);color:var(--ink)}
  .modal-body{padding:18px;display:grid;gap:14px;max-height:70vh;overflow:auto}
  .modal-foot{padding:14px 18px;border-top:1px solid var(--line-2);display:flex;gap:8px;align-items:center}
  label.f{display:grid;gap:5px;font-size:12px;font-weight:600;color:var(--ink-2)}
  label.f .req{color:var(--warn)}
  .control{
    border:1px solid var(--line);border-radius:9px;padding:9px 11px;background:#fff;color:var(--ink);width:100%;outline:none;
  }
  .control:focus{border-color:var(--steel);box-shadow:0 0 0 3px rgba(31,58,95,.12)}
  textarea.control{resize:vertical;min-height:62px}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .hint{font-size:12px;color:var(--ink-3);line-height:1.5}
  .hint a{color:var(--steel)}
  .swatches{display:flex;gap:7px;flex-wrap:wrap}
  .color-row{display:flex;align-items:center;gap:12px}
  .color-row input[type=color]{width:48px;height:34px;padding:0;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;flex:0 0 auto}
  .color-row input[type=color]::-webkit-color-swatch-wrapper{padding:3px}
  .color-row input[type=color]::-webkit-color-swatch{border:none;border-radius:5px}
  .color-row input[type=color]::-moz-color-swatch{border:none;border-radius:5px}
  .color-row .swatches{flex:1}
  .card .avatar{width:30px;height:30px;border-radius:50%;background:var(--steel,#5E6B7C);color:#fff;display:grid;place-items:center;font-weight:700;font-size:12px;flex:0 0 auto}
  .respnote{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:13px;color:var(--ink-2)}
  .qr-code-text{margin-top:8px;font-size:12px;color:var(--ink-3)}
  .qr-code-text code{font-family:var(--mono);background:var(--bg);padding:2px 6px;border-radius:5px;color:var(--ink-2)}
  /* Benachrichtigungen / Status */
  .icon-btn.bell{position:relative}
  .badge-count{position:absolute;top:-3px;right:-3px;min-width:16px;height:16px;padding:0 4px;border-radius:9px;background:var(--warn);color:#fff;font-size:10px;font-weight:800;line-height:16px;text-align:center;box-shadow:0 0 0 2px var(--panel)}
  .warn-banner{background:#FBEAE7;border-bottom:1px solid #E6C0BA;color:#7A2E1B}
  .warn-banner button{background:var(--warn);color:#fff;border:none;border-radius:7px;padding:5px 12px;font-weight:600;cursor:pointer}
  .pill.overdue{background:#FBEAE7;border-color:#E6C0BA;color:var(--warn);font-weight:700}
  .pill.ret{background:var(--bg);border-color:var(--line);color:var(--ink-3)}
  .od-row{display:flex;align-items:center;gap:11px;padding:11px 2px;border-bottom:1px solid var(--line)}
  .od-row .swatch{width:14px;height:14px;border-radius:4px;flex:0 0 auto}
  .od-main{flex:1;min-width:0}
  .od-t{font-weight:700;font-size:14px}
  .od-sub{font-size:12px;color:var(--ink-2);margin-top:1px}
  .od-act{display:flex;gap:6px;flex:0 0 auto;flex-wrap:wrap;justify-content:flex-end}
  .ret-info{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:6px 0 4px}
  .ret-info .k{font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.03em}
  .cat-ic{display:inline-grid;place-items:center;width:28px;height:28px;border-radius:7px;background:var(--bg);color:var(--ink-2);font-size:14px;flex:0 0 auto}
  @media (max-width:680px){ .od-act{width:100%;justify-content:flex-start;margin-top:4px} .ret-info{grid-template-columns:1fr} }
  .swatches button{width:26px;height:26px;border-radius:7px;border:2px solid transparent}
  .swatches button[aria-pressed="true"]{border-color:var(--ink);box-shadow:0 0 0 2px #fff inset}
  .conflict-note{background:#fdf2ee;border:1px solid #eccabf;color:var(--warn);border-radius:9px;padding:9px 11px;font-size:12.5px;display:flex;gap:8px;align-items:flex-start}
  .ok-note{background:#eef8f1;border:1px solid #bfe3cd;color:#176a3a;border-radius:9px;padding:9px 11px;font-size:12.5px}
  .kbd{font-family:var(--mono);font-size:11px;background:var(--bg);border:1px solid var(--line);border-radius:5px;padding:1px 6px}
  .steps{counter-reset:s;display:grid;gap:9px;margin:0;padding:0;list-style:none}
  .steps li{position:relative;padding-left:30px;font-size:12.5px;color:var(--ink-2)}
  .steps li::before{counter-increment:s;content:counter(s);position:absolute;left:0;top:0;width:21px;height:21px;border-radius:50%;background:var(--steel);color:#fff;font-size:11px;font-weight:700;display:grid;place-items:center}

  /* ---------- Toast ---------- */
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 10px 30px rgba(0,0,0,.3);z-index:80;opacity:0;transition:.22s;display:flex;gap:9px;align-items:center}
  .toast.show{transform:translateX(-50%);opacity:1}
  .toast.err{background:var(--warn)}
  .toast.ok{background:var(--ok)}

.tl-corner.intraday-corner{font-family:var(--mono);font-size:12.5px;font-weight:700;color:var(--ink);letter-spacing:0;text-transform:none}
  .tl-hour{width:var(--hour-w,60px);min-width:var(--hour-w,60px);flex:0 0 var(--hour-w,60px);padding:7px 0 6px;border-left:1px solid var(--line-2);font-family:var(--mono);color:var(--ink-3);font-size:11px}
  .tl-hour span{padding-left:5px}
  .tl-hour.now{background:rgba(35,31,32,.06);color:var(--ink)}
  .tl-track.intraday{cursor:copy;background-image:repeating-linear-gradient(to right, transparent 0 calc(var(--hour-w,60px) - 1px), var(--line-2) calc(var(--hour-w,60px) - 1px), var(--line-2) var(--hour-w,60px))}
  .tl-track.intraday .now-line{position:absolute;top:0;bottom:0;width:2px;background:var(--warn);z-index:4;pointer-events:none}
  .bar.allday{background-image:repeating-linear-gradient(45deg, rgba(255,255,255,.16) 0 6px, transparent 6px 12px)}
  .modal-seg{width:100%}
  .modal-seg button{flex:1}
  .quick-dur{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:10px;font-size:12px;color:var(--ink-3)}
  .quick-dur button{border:1px solid var(--line);background:var(--panel);border-radius:7px;padding:5px 9px;font-size:12px;font-weight:600;color:var(--ink-2)}
  .quick-dur button:hover{border-color:var(--ink);color:var(--ink)}
  .pill.tag{background:var(--bg);border-color:var(--line);color:var(--ink-2)}
  .share-qr{display:flex;justify-content:center;padding:12px;background:#fff;border:1px solid var(--line);border-radius:10px;margin-bottom:8px}
  .share-qr svg{display:block}
  .card.defect{border-color:#E6C0BA;box-shadow:0 0 0 1px #E6C0BA, var(--shadow)}
  .card.defect .swatch{outline:2px solid var(--warn);outline-offset:1px}
  .pill.defekt{background:#FBEAE7;border-color:#E6C0BA;color:var(--warn);font-weight:700}

  /* ===================== Kalender ===================== */
  .cal-title{font-weight:700;font-size:15px;color:var(--ink);min-width:118px;padding:0 4px;white-space:nowrap}
  .cal{font-size:13px;height:100%}
  /* Monat */
  .cal-month{display:flex;flex-direction:column;min-height:100%}
  .cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);position:sticky;top:0;background:var(--panel);z-index:5;border-bottom:1px solid var(--line)}
  .cal-weekdays>div{padding:7px 10px;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3)}
  .cal-weeks{flex:1;display:flex;flex-direction:column}
  .cal-week{position:relative;border-bottom:1px solid var(--line)}
  .cal-daycells{display:grid;grid-template-columns:repeat(7,1fr);height:100%}
  .cal-day{border-left:1px solid var(--line-2);padding-top:3px;cursor:copy}
  .cal-day:first-child{border-left:0}
  .cal-day.wknd{background:var(--weekend)}
  .cal-day.other{background:#FAFAF8}
  .cal-day.other .cal-daynum{color:var(--ink-3)}
  .cal-day.today .cal-daynum{background:var(--ink);color:#fff}
  .cal-daynum{display:inline-flex;align-items:center;justify-content:center;min-width:24px;height:24px;border-radius:50%;font-size:12.5px;font-weight:600;margin-left:4px;font-variant-numeric:tabular-nums}
  .cal-events{position:absolute;left:0;right:0;bottom:2px;pointer-events:none}
  .cal-events>*{pointer-events:auto}
  .cal-evt{position:absolute;border-radius:4px;color:#fff;font-size:11px;font-weight:600;padding:0 6px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer;box-shadow:0 1px 1px rgba(0,0,0,.14);text-shadow:0 1px 1px rgba(0,0,0,.2)}
  .cal-evt:hover{filter:brightness(1.08)}
  .cal-evt.conflict{box-shadow:0 0 0 1.5px var(--warn)}
  .cal-more{position:absolute;height:15px;font-size:11px;font-weight:600;color:var(--ink-2);cursor:pointer;line-height:15px}
  .cal-more:hover{color:var(--ink);text-decoration:underline}
  /* Woche / Tag */
  .cal-time{display:flex;flex-direction:column;height:100%}
  .cal-time-head{display:grid;grid-template-columns:var(--gutter) 1fr;border-bottom:1px solid var(--line);background:var(--panel);position:relative;z-index:4}
  .cal-heads{display:grid;grid-template-columns:repeat(var(--n),1fr)}
  .cal-dayhead{padding:6px 2px 5px;text-align:center;border-left:1px solid var(--line-2);cursor:pointer;display:flex;flex-direction:column;gap:1px}
  .cal-dayhead .dh-dow{font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.03em}
  .cal-dayhead .dh-num{font-size:17px;font-weight:600;font-variant-numeric:tabular-nums}
  .cal-dayhead.today .dh-num{color:#fff;background:var(--ink);width:27px;height:27px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin:0 auto}
  .cal-allday{display:grid;grid-template-columns:var(--gutter) 1fr;border-bottom:1px solid var(--line);background:var(--panel)}
  .cal-allday-label{font-size:9px;color:var(--ink-3);text-transform:uppercase;padding:4px 5px;text-align:right;line-height:1.2}
  .cal-allday-lane{position:relative;padding:2px 0;min-height:21px}
  .cal-allday .cal-evt.allday{height:17px;line-height:17px;font-size:11px}
  .cal-body{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden}
  .cal-grid{display:grid;grid-template-columns:var(--gutter) 1fr;position:relative}
  .cal-gutter{position:relative}
  .cal-hour{height:var(--hourH);position:relative}
  .cal-hour span{position:absolute;top:-7px;right:6px;font-size:10px;color:var(--ink-3);font-family:var(--mono);background:var(--panel);padding:0 2px}
  .cal-cols{display:grid;grid-template-columns:repeat(var(--n),1fr)}
  .cal-col{position:relative;border-left:1px solid var(--line-2);cursor:copy;background-image:repeating-linear-gradient(to bottom, transparent 0 calc(var(--hourH) - 1px), var(--line-2) calc(var(--hourH) - 1px), var(--line-2) var(--hourH))}
  .cal-col.today{background-color:rgba(35,31,32,.025)}
  .cal-block{position:absolute;border-radius:5px;color:#fff;padding:1px 5px;overflow:hidden;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.18);font-size:11px;display:flex;flex-direction:column;border:1px solid rgba(0,0,0,.08);text-shadow:0 1px 1px rgba(0,0,0,.18)}
  .cal-block:hover{filter:brightness(1.08);z-index:3}
  .cal-block .cb-t{font-weight:700;font-size:10px;white-space:nowrap;opacity:.95}
  .cal-block .cb-a{font-weight:700;font-size:11px;line-height:1.12;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cal-block .cb-l{font-weight:500;font-size:11px;line-height:1.12;overflow:hidden;opacity:.95}
  .cal-block.conflict{box-shadow:0 0 0 2px var(--warn)}
  .cal-evt.ret,.cal-block.ret{opacity:.55}
  .cal-now{position:absolute;left:0;right:0;height:0;border-top:2px solid var(--warn);z-index:5;pointer-events:none}
  .cal-now::before{content:"";position:absolute;left:-3px;top:-4px;width:8px;height:8px;border-radius:50%;background:var(--warn)}

  /* ---------- Untere Tab-Leiste (nur Mobil) ---------- */
  .bottom-nav{display:none}

  @media (max-width:680px){
    :root{--name-w:128px;--day-w:40px}
    body{ -webkit-tap-highlight-color:transparent; }
    button{ touch-action:manipulation; }
    header{ height:54px; padding:0 12px; gap:10px; }
    .brand-label,.brand-div{display:none}
    .brand .logo,.brand .logo-svg{height:30px}
    nav.tabs{display:none}                       /* obere Tabs -> untere Leiste */
    .head-right{gap:8px}
    .sync .label{display:none}
    .sync{padding:6px 11px}
    .icon-btn{width:38px;height:38px}
    .toolbar{gap:7px;padding:9px 12px}
    .tl-corner{padding:0 8px;font-size:10px;letter-spacing:.02em}
    .tl-corner.intraday-corner{font-size:11px}
    .tl-rowname{padding:7px 8px;gap:7px}
    .tl-rowname .swatch{width:9px;height:9px}
    .tl-rowname .nm{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tl-rowname .tp{display:none}
    .field{height:38px}
    .field input,.field select{height:36px}
    .btn{padding:9px 13px}
    .grid-2{grid-template-columns:1fr}
    .scroll{padding:16px 13px 24px}
    .cards{grid-template-columns:1fr}
    .modal{border-radius:16px}
    .overlay{padding:12px 10px}
    .toast{bottom:calc(70px + env(safe-area-inset-bottom))}

    .bottom-nav{
      display:flex;flex:0 0 auto;z-index:50;
      background:var(--panel);border-top:1px solid var(--line);
      padding-bottom:env(safe-area-inset-bottom);
    }
    .bottom-nav button{
      flex:1;background:none;border:0;color:var(--ink-3);cursor:pointer;
      display:flex;flex-direction:column;align-items:center;gap:3px;
      padding:8px 4px 6px;font-size:11px;font-weight:600;letter-spacing:.01em;
    }
    .bottom-nav button svg{width:23px;height:23px}
    .bottom-nav button[aria-selected="true"]{color:var(--ink)}
    .bottom-nav button:active{background:var(--bg)}
    .cal-title{font-size:13px;min-width:0}
    .cal-weekdays>div{padding:6px 6px;font-size:10px}
    .cal-daynum{min-width:20px;height:20px;font-size:11.5px}
    .cal-evt{font-size:10.5px;padding:0 4px}
    .cal-dayhead .dh-num{font-size:15px}
    .cal-dayhead.today .dh-num{width:23px;height:23px}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important}}
</style>
</head>

</div>

<main>
  <!-- ZEITSTRAHL -->
  <section class="view active" id="view-timeline">
    <div class="toolbar">
      <div class="nav-range">
        <button id="navPrev" title="Zurück">‹</button>
        <button class="today-btn" id="navToday">Heute</button>
        <button id="navNext" title="Vor">›</button>
      </div>
      <div class="cal-title" id="calTitle"></div>
      <div class="seg" id="rangeSeg">
        <button data-view="month" aria-pressed="true">Monat</button>
        <button data-view="week">Woche</button>
        <button data-view="day">Tag</button>
      </div>
      <div class="field">
        <span style="color:var(--ink-3)">🔎</span>
        <input id="tlSearch" placeholder="Gerät / Ort suchen" style="width:150px">
      </div>
      <div class="field">
        <select id="tlType"><option value="">Alle Typen</option></select>
      </div>
      <div class="spacer"></div>
      <button class="btn" id="addAssetBtn">+ Gerät</button>
      <button class="btn amber" id="addBookingBtn">+ Einsatz</button>
    </div>
    <div class="timeline" id="timeline"></div>
  </section>

  <!-- EINSÄTZE -->
  <section class="view" id="view-bookings">
    <div class="toolbar">
      <div class="seg" id="bookingFilter">
        <button data-f="active" aria-pressed="true">Aktuell &amp; geplant</button>
        <button data-f="all">Alle</button>
        <button data-f="past">Vergangen</button>
      </div>
      <div class="field">
        <span style="color:var(--ink-3)">🔎</span>
        <input id="bSearch" placeholder="Ort / Gerät / Person" style="width:170px">
      </div>
      <div class="spacer"></div>
      <button class="btn amber" id="addBookingBtn2">+ Einsatz</button>
    </div>
    <div class="scroll"><div class="wrap" id="bookingList"></div></div>
  </section>

  <!-- GERÄTE -->
  <section class="view" id="view-assets">
    <div class="toolbar">
      <div class="field">
        <span style="color:var(--ink-3)">🔎</span>
        <input id="aSearch" placeholder="Gerät suchen" style="width:170px">
      </div>
      <div class="field">
        <select id="aType"><option value="">Alle Typen</option></select>
      </div>
      <div class="spacer"></div>
      <button class="btn amber" id="addAssetBtn2">+ Gerät</button>
    </div>
    <div class="scroll"><div class="wrap" id="assetList"></div></div>
  </section>

  <!-- VERANTWORTLICHE -->
  <section class="view" id="view-responsibles">
    <div class="toolbar">
      <div class="field"><span style="color:var(--ink-3)">🔎</span>
        <input id="rSearch" placeholder="Verantwortliche suchen" style="width:170px"></div>
      <div class="spacer"></div>
      <button class="btn amber" id="addRespBtn">+ Verantwortliche/r</button>
    </div>
    <div class="scroll"><div class="wrap" id="respList"></div></div>
  </section>

  <!-- KATEGORIEN -->
  <section class="view" id="view-categories">
    <div class="toolbar">
      <div class="field"><span style="color:var(--ink-3)">🔎</span>
        <input id="cSearch" placeholder="Kategorie suchen" style="width:170px"></div>
      <div class="spacer"></div>
      <button class="btn amber" id="addCatBtn">+ Kategorie</button>
    </div>
    <div class="scroll"><div class="wrap" id="catList"></div></div>
  </section>
</main>

<nav class="bottom-nav" id="bottomNav">
  <button data-view="timeline" aria-selected="true">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="7" x2="14" y2="7"/><line x1="8" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="11" y2="17"/></svg>

  <button data-view="bookings" aria-selected="false">

    Einsätze</button>
  <button data-view="assets" aria-selected="false">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6.5h11v8H3z"/><path d="M14 9h4l3 3v2.5h-7z"/><circle cx="7" cy="18" r="1.6"/><circle cx="17" cy="18" r="1.6"/></svg>

  <button data-view="responsibles" aria-selected="false">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.2"/><path d="M5 19c0-3.3 3.1-5 7-5s7 1.7 7 5"/></svg>
    Personen</button>
  <button data-view="categories" aria-selected="false">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7l8-3 8 3-8 3-8-3z"/><path d="M4 12l8 3 8-3"/><path d="M4 17l8 3 8-3"/></svg>

<script>
"use strict";
/* ============================================================
   BSB Tracking – Zustand, GitHub-Sync, Rendering
   Daten liegen als JSON-Datei im GitHub-Repo (nicht lokal).
   ============================================================ */

const CFG_KEY = "bsb_tracking_config_v1";
const PENDING_KEY = "bsb_tracking_pending_v1"; // Sicherheitspuffer für noch nicht nach GitHub geschriebene Änderungen
const PALETTE = ["#3E6FB0","#2D9A8B","#C9603C","#7E57C2","#C25587","#4F8A3F","#B07A24","#4789A0","#A8463C","#5E6B7C"];
const TYPES   = ["LKW","Bagger","Radlader","Putzmaschine","Estrichmaschine","Anhänger","Gerüst","Container","Werkzeug","Sonstiges"];
const MONTHS  = ["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
const DOW     = ["So","Mo","Di","Mi","Do","Fr","Sa"];
const MONTHS_LONG=["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
const DOW_LONG=["Sonntag","Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag"];

let state = { assets: [], bookings: [], tombstones: [], updatedAt: null };
let cfg   = { owner:"", repo:"", path:"daten/bsb-tracking.json", branch:"main", token:"" };
let remoteSha = null;
let lastPull  = 0;
let connected = false;

let cal = { view:"month", anchor: startOfDay(new Date()) };
let ui = { tlSearch:"", tlType:"", bFilter:"active", bSearch:"", aSearch:"", aType:"", rSearch:"", cSearch:"" };

/* ---------- Hilfsfunktionen: Datum ---------- */
function startOfDay(d){ const x=new Date(d); x.setHours(0,0,0,0); return x; }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function diffDays(a,b){ return Math.round((startOfDay(b)-startOfDay(a))/86400000); }
function todayStr(){ return toISO(new Date()); }
function toISO(d){ const x=startOfDay(d); const m=String(x.getMonth()+1).padStart(2,"0"); const day=String(x.getDate()).padStart(2,"0"); return x.getFullYear()+"-"+m+"-"+day; }
function fromISO(s){ const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); }
function fmtDE(s){ const d=fromISO(s); return String(d.getDate()).padStart(2,"0")+"."+String(d.getMonth()+1).padStart(2,"0")+"."+d.getFullYear(); }
function fmtShort(s){ const d=fromISO(s); return String(d.getDate()).padStart(2,"0")+"."+String(d.getMonth()+1).padStart(2,"0")+"."; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }
function now(){ return new Date().toISOString(); }
function pad2(n){ return String(n).padStart(2,"0"); }
/* ---------- Buchungshelfer: ganztägig ODER mit Uhrzeit ---------- */
function timed(b){ return b.allDay===false || (b.start||"").includes("T"); }
function startMs(b){ const s=b.start||""; return s.includes("T")? new Date(s).getTime() : fromISO(s).getTime(); }
function endMs(b){ const e=b.end||""; return e.includes("T")? new Date(e).getTime() : fromISO(e).getTime()+86400000; }
function sd(b){ return (b.start||"").slice(0,10); }
function ed(b){ return (b.end||"").slice(0,10); }
function hhmm(dt){ const d=new Date(dt); return pad2(d.getHours())+":"+pad2(d.getMinutes()); }
function fmtRange(b){
  if(timed(b)){ return sd(b)===ed(b)
    ? fmtShort(sd(b))+" "+hhmm(b.start)+"–"+hhmm(b.end)
    : fmtShort(sd(b))+" "+hhmm(b.start)+" – "+fmtShort(ed(b))+" "+hhmm(b.end); }
  return sd(b)===ed(b)? fmtShort(sd(b)) : fmtShort(sd(b))+"–"+fmtShort(ed(b));
}
function fmtStartShort(b){ return timed(b)? fmtShort(sd(b))+" "+hhmm(b.start) : fmtShort(sd(b)); }
function durLabel(b){
  if(timed(b)){ const h=(endMs(b)-startMs(b))/3600000;
    return h<24? (Math.round(h*10)/10).toString().replace(".",",")+" Std"
               : (Math.round(h/24*10)/10).toString().replace(".",",")+" Tage"; }
  const d=diffDays(fromISO(sd(b)),fromISO(ed(b)))+1; return d+" Tag"+(d>1?"e":"");
}

/* ---------- Base64 (UTF-8-sicher) ---------- */
function utf8ToB64(str){
  const bytes=new TextEncoder().encode(str); let bin=""; const ch=0x8000;
  for(let i=0;i<bytes.length;i+=ch){ bin+=String.fromCharCode.apply(null,bytes.subarray(i,i+ch)); }
  return btoa(bin);
}
function b64ToUtf8(b64){
  const clean=b64.replace(/\s/g,""); const bin=atob(clean);
  const bytes=Uint8Array.from(bin,c=>c.charCodeAt(0));
  return new TextDecoder().decode(bytes);
}

/* ---------- GitHub-API ---------- */
function ghUrl(){
  return "https://api.github.com/repos/"+encodeURIComponent(cfg.owner)+"/"+encodeURIComponent(cfg.repo)
       + "/contents/"+cfg.path.split("/").map(encodeURIComponent).join("/");
}
function ghHeaders(){
  return {
    "Authorization":"Bearer "+cfg.token,
    "Accept":"application/vnd.github+json",
    "X-GitHub-Api-Version":"2022-11-28"
  };
}
async function ghRepoStatus(){
  try{
    const res = await fetch("https://api.github.com/repos/"+encodeURIComponent(cfg.owner)+"/"+encodeURIComponent(cfg.repo),
      { headers: ghHeaders(), cache:"no-store" });
    return res.status; // 200 = Repo erreichbar, 404 = nicht gefunden / kein Zugriff, 401/403 = Token
  }catch(e){ return 0; } // 0 = Netzwerkfehler
}
function diagnose404(repoStatus){
  if(repoStatus===200) return null; // Repo ok, Datei fehlt nur (wird angelegt)
  if(repoStatus===401||repoStatus===403) return "Token ungültig oder ohne Zugriff auf dieses Repo.";
  if(repoStatus===0) return "Keine Verbindung zu GitHub.";
  return "Repo „"+cfg.owner+"/"+cfg.repo+"\" nicht gefunden oder Token hat keinen Zugriff. Benutzer, Repo-Name und Token-Berechtigung prüfen.";
}
async function ghGet(){
  const res = await fetch(ghUrl()+"?ref="+encodeURIComponent(cfg.branch)+"&t="+Date.now(), { headers: ghHeaders(), cache:"no-store" });
  if(res.status===404) return { status:404 };
  if(res.status===401 || res.status===403) throw new Error("Zugriff verweigert – Token oder Berechtigungen prüfen ("+res.status+").");
  if(!res.ok) throw new Error("Laden fehlgeschlagen ("+res.status+").");
  const body = await res.json();
  return { status:200, content:b64ToUtf8(body.content), sha:body.sha };
}
async function ghPut(content, sha){
  const payload = { message:"BSB Tracking – Aktualisierung "+now(), content:utf8ToB64(content), branch:cfg.branch };
  if(sha) payload.sha = sha;
  const res = await fetch(ghUrl(), { method:"PUT", headers:{...ghHeaders(),"Content-Type":"application/json"}, body:JSON.stringify(payload) });
  if(res.status===409) return { conflict:true };
  if(res.status===401 || res.status===403) throw new Error("Speichern verweigert – Token braucht Schreibrecht (Contents: read/write).");
  if(!res.ok){ let m=""; try{ m=(await res.json()).message||""; }catch(e){} throw new Error("Speichern fehlgeschlagen ("+res.status+") "+m); }
  return await res.json();
}

/* ---------- Merge (mehrere Geräte, letzte Änderung gewinnt) ---------- */
function emptyData(){ return { assets:[], bookings:[], responsibles:[], categories:[], tombstones:[], updatedAt:null }; }
function parseData(txt){
  const t=(txt||"").trim();
  if(!t) return emptyData();                       // neu angelegte / leere Datei
  try { return {...emptyData(), ...JSON.parse(t)}; }
  catch(e){ throw new Error("Die Datei "+cfg.path+" enthält kein gültiges JSON. Bitte den Inhalt prüfen oder die Datei komplett leeren – sie wird dann automatisch neu befüllt."); }
}
function mergeStates(a,b){
  const tomb={};
  [...(a.tombstones||[]),...(b.tombstones||[])].forEach(t=>{ if(!tomb[t.id]||t.deletedAt>tomb[t.id]) tomb[t.id]=t.deletedAt; });
  function mergeList(la,lb){
    const m={};
    [...(la||[]),...(lb||[])].forEach(it=>{ const ex=m[it.id]; if(!ex||(it.updatedAt||"")>(ex.updatedAt||"")) m[it.id]=it; });
    return Object.values(m).filter(it=> !(tomb[it.id] && tomb[it.id] >= (it.updatedAt||"")));
  }
  return {
    assets: mergeList(a.assets,b.assets),
    bookings: mergeList(a.bookings,b.bookings),
    responsibles: mergeList(a.responsibles,b.responsibles),
    categories: mergeList(a.categories,b.categories),
    tombstones: Object.entries(tomb).map(([id,deletedAt])=>({id,deletedAt})),
    updatedAt: now()
  };
}

/* ---------- Laden / Speichern ---------- */
function loadConfig(){
  try{ const s=JSON.parse(localStorage.getItem(CFG_KEY)||"{}"); cfg={...cfg,...s}; }catch(e){}
}
function saveConfig(){ localStorage.setItem(CFG_KEY, JSON.stringify(cfg)); }
function isConfigured(){ return cfg.owner && cfg.repo && cfg.path && cfg.token; }

/* ---------- Zugang teilen / importieren (geräteübergreifend) ---------- */
function b64url(s){ return utf8ToB64(s).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,""); }
function unb64url(s){ s=s.replace(/-/g,"+").replace(/_/g,"/"); while(s.length%4) s+="="; return b64ToUtf8(s); }
function accessLink(){
  const p={o:cfg.owner,r:cfg.repo,p:cfg.path,b:cfg.branch,t:cfg.token};
  return location.origin+location.pathname+"#access="+b64url(JSON.stringify(p));
}
function deviceLink(id){
  return location.origin+location.pathname+"#g="+id;   // kurz & token-frei -> druckbar auf kleinen Etiketten
}
function applyAccessCode(text){
  let code=(text||"").trim();
  const m=code.match(/access=([A-Za-z0-9\-_]+)/); if(m) code=m[1];
  try{ const d=JSON.parse(unb64url(code));
    if(!d||!d.t||!d.o||!d.r) return false;
    cfg.owner=d.o; cfg.repo=d.r; cfg.path=d.p||cfg.path; cfg.branch=d.b||cfg.branch; cfg.token=d.t;
    saveConfig(); return true;
  }catch(e){ return false; }
}
let pendingQuickBook=null;
function importFromHash(){
  const h=location.hash||"";
  if(!h.includes("access=") && !h.includes("g=") && !h.includes("geraet=")) return false;
  let ok=false;
  if(h.includes("access=")) ok=applyAccessCode(h);
  const g=h.match(/(?:^|[#&?])g=([A-Za-z0-9]+)/) || h.match(/geraet=([A-Za-z0-9]+)/);
  if(g) pendingQuickBook=g[1];
  history.replaceState(null,"",location.pathname+location.search); // Hash (inkl. evtl. Token) entfernen
  return ok || !!g;
}
function qrSvg(text,size,ecc,margin){
  if(typeof qrcode==="undefined") return '<div class="hint">QR-Code nicht verfügbar.</div>';
  try{ const qr=qrcode(0,ecc||"L"); qr.addData(text); qr.make();
    const n=qr.getModuleCount(), m=(margin==null?4:margin), t=n+m*2; let path="";
    for(let r=0;r<n;r++) for(let c=0;c<n;c++) if(qr.isDark(r,c)) path+="M"+(c+m)+" "+(r+m)+"h1v1h-1z";
    return '<svg viewBox="0 0 '+t+' '+t+'" width="'+size+'" height="'+size+'" shape-rendering="crispEdges" xmlns="http://www.w3.org/2000/svg"><rect width="'+t+'" height="'+t+'" fill="#fff"/><path d="'+path+'" fill="#231F20"/></svg>';
  }catch(e){ return '<div class="hint">QR-Code konnte nicht erzeugt werden (Token evtl. zu lang).</div>'; }
}
function copyText(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>toast("Link kopiert","ok"),()=>fallbackCopy(text));
  } else fallbackCopy(text);
}
function fallbackCopy(text){
  const ta=document.createElement("textarea"); ta.value=text; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand("copy"); toast("Link kopiert","ok"); }catch(e){ toast("Kopieren nicht möglich – Link manuell markieren","err"); }
  ta.remove();
}

async function pull(silent){
  if(!isConfigured()) return;
  if(!silent) setSync("loading","Lädt …");
  try{
    const r = await ghGet();
    if(r.status===404){
      const problem=diagnose404(await ghRepoStatus());
      if(problem) throw new Error(problem);
      state=emptyData(); remoteSha=null;           // Repo ok, Datei wird beim Speichern angelegt
    }
    else { state=parseData(r.content); remoteSha=r.sha; }
    connected=true; lastPull=Date.now();
    // Aus einem früheren Versuch übrig gebliebene, noch nicht gesendete Änderungen jetzt übertragen
    if(recoverPending()){ renderAll(); maybeQuickBook(); pushNow(); return; }
    setSync("connected","Verbunden");
    renderAll();
    maybeQuickBook();
  }catch(e){
    connected=false; setSync("error", e.message);
    if(!silent) toast(e.message,"err");
  }
}
function recoverPending(){
  try{
    const raw=localStorage.getItem(PENDING_KEY); if(!raw) return false;
    const p=JSON.parse(raw); if(!p||!p.state) return false;
    state = mergeStates(state, p.state);   // gepufferte Änderungen über den GitHub-Stand legen
    return true;
  }catch(e){ return false; }
}

let saveQueued=false, saving=false, retryTimer=null, lastErr=null;
function markDirty(){ try{ localStorage.setItem(PENDING_KEY, JSON.stringify({state, at:now()})); }catch(e){} }
function clearDirty(){ try{ localStorage.removeItem(PENDING_KEY); }catch(e){} }
function hasPending(){ try{ return !!localStorage.getItem(PENDING_KEY); }catch(e){ return false; } }

// Jede Änderung wird sofort lokal gesichert UND sofort nach GitHub geschrieben.
function save(){
  renderAll();
  markDirty();
  if(!isConfigured()){ updateBanner(); setSync("off","Nicht verbunden – Änderung gemerkt"); return; }
  pushNow();
}

async function pushNow(){
  if(!isConfigured()) return;
  if(saving){ saveQueued=true; return; }
  clearTimeout(retryTimer);
  saving=true; setSync("saving","Speichert …");
  try{
    let tries=0;
    while(true){
      tries++;
      const r = await ghGet();
      let remote = emptyData(), sha=null;
      if(r.status===200){ remote=parseData(r.content); sha=r.sha; }
      else if(r.status===404){
        const problem=diagnose404(await ghRepoStatus());
        if(problem) throw new Error(problem);       // Repo/Token-Problem klar benennen statt blind anzulegen
      }
      const merged = mergeStates(remote, state);
      state = merged;
      const put = await ghPut(JSON.stringify(merged,null,2), sha);
      if(put.conflict){ if(tries<4) continue; throw new Error("Schreibkonflikt – bitte erneut versuchen."); }
      remoteSha = put.content.sha; lastPull=Date.now(); connected=true;
      break;
    }
    clearDirty(); lastErr=null;
    setSync("saved","Gespeichert");
    document.getElementById("syncBtn").title="Zuletzt gespeichert: "+new Date().toLocaleTimeString();
    renderAll();
  }catch(e){
    connected = isConfigured();
    const m=(e&&e.message)||"Unbekannter Fehler";
    setSync("error","Nicht gespeichert");
    document.getElementById("syncBtn").title=m;     // voller Grund per Tooltip
    if(m!==lastErr){ toast("Speichern fehlgeschlagen: "+m,"err"); lastErr=m; }
    scheduleRetry();
  } finally {
    saving=false;
    if(saveQueued){ saveQueued=false; pushNow(); }
  }
}
function scheduleRetry(){
  clearTimeout(retryTimer);
  retryTimer=setTimeout(()=>{ if(isConfigured() && !saving) pushNow(); }, 7000);
}

function assetById(id){ return state.assets.find(a=>a.id===id); }
function assetName(b){ const a=assetById(b.assetId); return a?a.name:"(gelöscht)"; }
function responsibleById(id){ return (state.responsibles||[]).find(r=>r.id===id); }

function bookingConflicts(bk){
  const s=startMs(bk), e=endMs(bk);
  return state.bookings.some(o=> o.id!==bk.id && o.assetId===bk.assetId && startMs(o)<e && s<endMs(o));

/* ===================== KALENDER (Monat / Woche / Tag) ===================== */
function laneify(bks){
  bks.forEach(b=>{ b._s=startMs(b); b._e=endMs(b); });
  bks.sort((x,y)=> x._s-y._s);
  const lanes=[];
  bks.forEach(b=>{ let placed=false;
    for(const l of lanes){ if(l[l.length-1]._e<=b._s){ l.push(b); b._lane=lanes.indexOf(l); placed=true; break; } }
    if(!placed){ b._lane=lanes.length; lanes.push([b]); } });
  return Math.max(1,lanes.length);
}
function assignColumns(evs){
  evs.forEach(b=>{ b._s=startMs(b); b._e=endMs(b); });
  evs.sort((a,b)=> a._s-b._s || a._e-b._e);
  let cluster=[], clusterEnd=-Infinity;
  const flush=()=>{ const cols=[]; cluster.forEach(ev=>{ let placed=false;
      for(let i=0;i<cols.length;i++){ if(cols[i]<=ev._s){ ev._col=i; cols[i]=ev._e; placed=true; break; } }
      if(!placed){ ev._col=cols.length; cols.push(ev._e); } });
    cluster.forEach(ev=> ev._cols=cols.length); cluster=[]; };
  evs.forEach(ev=>{ if(cluster.length && ev._s>=clusterEnd){ flush(); clusterEnd=-Infinity; } cluster.push(ev); clusterEnd=Math.max(clusterEnd,ev._e); });
  if(cluster.length) flush();
}
function weekStart(d){ const x=startOfDay(d); const dow=(x.getDay()+6)%7; return addDays(x,-dow); } // Montag = Wochenanfang
function tlEmptyAssets(){ return '<div class="empty-tl"><h3>Noch keine Geräte angelegt</h3><p>Lege LKWs, Bagger oder Maschinen an, um ihre Einsätze im Kalender zu sehen.</p><button class="btn amber" onclick="openAssetModal()">+ Erstes Gerät anlegen</button></div>'; }

function visibleBookings(){
  const q=(ui.tlSearch||"").toLowerCase();
  return state.bookings.filter(b=>{ const a=assetById(b.assetId);
    if(!a||a.active===false) return false;
    if(ui.tlType && a.type!==ui.tlType) return false;
    if(q && !((a.name||"").toLowerCase().includes(q)||(b.location||"").toLowerCase().includes(q))) return false;
    return true; });
}
function calTitleText(){
  const a=cal.anchor;
  if(cal.view==="month") return MONTHS_LONG[a.getMonth()]+" "+a.getFullYear();
  if(cal.view==="week"){ const ws=weekStart(a), we=addDays(ws,6); return fmtShort(toISO(ws))+"–"+fmtDE(toISO(we)); }
  return DOW_LONG[a.getDay()]+", "+fmtDE(toISO(a));
}
function calShift(dir){
  const a=cal.anchor;
  if(cal.view==="month") cal.anchor=startOfDay(new Date(a.getFullYear(),a.getMonth()+dir,1));
  else if(cal.view==="week") cal.anchor=addDays(a,dir*7);
  else cal.anchor=addDays(a,dir);
}

function renderTimeline(){

/* ---------- Monatsansicht ---------- */
function renderMonth(root){
  const a=cal.anchor, mobile=window.matchMedia("(max-width:680px)").matches;
  const BAR=mobile?16:18, GAP=2, DNUM=mobile?24:28, MAXLANES=mobile?2:3;
  const weekH=DNUM+MAXLANES*(BAR+GAP)+18;
  const gridStart=weekStart(new Date(a.getFullYear(),a.getMonth(),1));
  const monthEnd=new Date(a.getFullYear(),a.getMonth()+1,0);
  const nWeeks=Math.ceil((diffDays(gridStart,monthEnd)+1)/7);
  const today=todayStr(), bks=visibleBookings();

  let html='<div class="cal cal-month"><div class="cal-weekdays">'
    + ["Mo","Di","Mi","Do","Fr","Sa","So"].map(d=>'<div>'+d+'</div>').join("")
    + '</div><div class="cal-weeks">';

  for(let w=0;w<nWeeks;w++){
    const ws=addDays(gridStart,w*7), wsMs=ws.getTime(), weMs=wsMs+7*86400000;
    let ev=bks.filter(b=> endMs(b)>wsMs && startMs(b)<weMs);
    laneify(ev);
    let cells="";
    for(let i=0;i<7;i++){ const d=addDays(ws,i), iso=toISO(d);
      const other=d.getMonth()!==a.getMonth(), wknd=(d.getDay()===0||d.getDay()===6);
      cells+='<div class="cal-day'+(other?' other':'')+(iso===today?' today':'')+(wknd?' wknd':'')+'" onclick="calDayClick(\''+iso+'\')"><span class="cal-daynum">'+d.getDate()+'</span></div>';
    }
    let bars=""; const overflow=[0,0,0,0,0,0,0];
    ev.forEach(b=>{
      const sCol=Math.max(0,diffDays(ws,fromISO(sd(b)))), eCol=Math.min(6,diffDays(ws,fromISO(ed(b))));
      if(b._lane<MAXLANES){
        const a2=assetById(b.assetId), conf=bookingConflicts(b), tm=timed(b);
        const lbl=(b.returnedAt?'✓ ':'')+(conf?'⚠ ':'')+(a2&&a2.defect?'🔧 ':'')+(tm?hhmm(b.start)+' ':'')+esc(a2?a2.name:'')+' · '+esc(b.location||'—');
        bars+='<div class="cal-evt'+(conf?' conflict':'')+(b.returnedAt?' ret':'')+'" style="left:calc('+(sCol/7*100)+'% + 3px);width:calc('+((eCol-sCol+1)/7*100)+'% - 6px);top:'+(b._lane*(BAR+GAP))+'px;height:'+BAR+'px;line-height:'+BAR+'px;background:'+(a2?a2.color:'#475569')+'" onclick="event.stopPropagation();openBookingModal(\''+b.id+'\')" title="'+esc(b.location)+' · '+fmtRange(b)+'">'+lbl+'</div>';
      } else { for(let c=Math.max(0,sCol);c<=eCol;c++) overflow[c]++; }
    });
    for(let i=0;i<7;i++){ if(overflow[i]>0){ const d=addDays(ws,i);
      bars+='<div class="cal-more" style="left:calc('+(i/7*100)+'% + 5px);top:'+(MAXLANES*(BAR+GAP)+1)+'px" onclick="calOpenDay(\''+toISO(d)+'\')">+'+overflow[i]+' mehr</div>'; } }
    html+='<div class="cal-week" style="height:'+weekH+'px"><div class="cal-daycells">'+cells+'</div><div class="cal-events" style="top:'+DNUM+'px">'+bars+'</div></div>';
  }
  html+='</div></div>';
  root.innerHTML=html;
}

/* ---------- Wochen-/Tagesansicht (Stundenraster) ---------- */
function renderWeek(root,n){
  const mobile=window.matchMedia("(max-width:680px)").matches;
  const base=n===7?weekStart(cal.anchor):startOfDay(cal.anchor);
  const days=[]; for(let i=0;i<n;i++) days.push(addDays(base,i));
  const today=todayStr(), nowMs=Date.now();
  const bks=visibleBookings();
  const hourH=mobile?42:48, gutter=46;
  const baseMs=base.getTime(), endMsAll=addDays(base,n).getTime();

  let heads='<div class="cal-corner"></div><div class="cal-heads">';
  days.forEach(d=>{ const iso=toISO(d);
    heads+='<div class="cal-dayhead'+(iso===today?' today':'')+'" onclick="calOpenDay(\''+iso+'\')"><span class="dh-dow">'+DOW[d.getDay()]+'</span><span class="dh-num">'+d.getDate()+'</span></div>'; });
  heads+='</div>';

  let allDayEv=bks.filter(b=> !timed(b) && endMs(b)>baseMs && startMs(b)<endMsAll);
  laneify(allDayEv); let allLanes=0; let allBars="";
  allDayEv.forEach(b=>{ allLanes=Math.max(allLanes,b._lane+1);
    const sCol=Math.max(0,diffDays(base,fromISO(sd(b)))), eCol=Math.min(n-1,diffDays(base,fromISO(ed(b))));
    const a2=assetById(b.assetId), conf=bookingConflicts(b);
    allBars+='<div class="cal-evt allday'+(conf?' conflict':'')+(b.returnedAt?' ret':'')+'" style="left:calc('+(sCol/n*100)+'% + 2px);width:calc('+((eCol-sCol+1)/n*100)+'% - 4px);top:'+(b._lane*19)+'px;background:'+(a2?a2.color:'#475569')+'" onclick="openBookingModal(\''+b.id+'\')" title="'+esc(b.location)+'">'+(b.returnedAt?'✓ ':'')+(conf?'⚠ ':'')+(a2&&a2.defect?'🔧 ':'')+esc(a2?a2.name:'')+' · '+esc(b.location||'—')+'</div>';
  });
  const allH=Math.max(1,allLanes)*19+4;

  let cols="";
  days.forEach(d=>{
    const dStart=d.getTime(), dEnd=dStart+86400000, iso=toISO(d);
    let blocks="";
    if(iso===today && nowMs>=dStart && nowMs<dEnd) blocks+='<div class="cal-now" style="top:'+(((nowMs-dStart)/3600000)*hourH)+'px"></div>';
    let dev=bks.filter(b=> timed(b) && endMs(b)>dStart && startMs(b)<dEnd);
    assignColumns(dev);
    dev.forEach(b=>{
      const s=Math.max(dStart,startMs(b)), e=Math.min(dEnd,endMs(b));
      const top=((s-dStart)/3600000)*hourH, h=Math.max(15,((e-s)/3600000)*hourH-1);
      const w=100/b._cols, left=b._col*w;
      const a2=assetById(b.assetId), conf=bookingConflicts(b);
      blocks+='<div class="cal-block'+(conf?' conflict':'')+(b.returnedAt?' ret':'')+'" style="top:'+top+'px;height:'+h+'px;left:calc('+left+'% + 1px);width:calc('+w+'% - 2px);background:'+(a2?a2.color:'#475569')+'" onclick="event.stopPropagation();openBookingModal(\''+b.id+'\')" title="'+esc(b.location)+' · '+fmtRange(b)+(responsibleName(b)?' · '+esc(responsibleName(b)):'')+'"><span class="cb-t">'+hhmm(b.start)+'–'+hhmm(b.end)+'</span><span class="cb-a">'+(a2&&a2.defect?'🔧 ':'')+esc(a2?a2.name:'')+'</span><span class="cb-l">'+(b.returnedAt?'✓ ':'')+esc(b.location||'—')+'</span></div>';
    });
    cols+='<div class="cal-col'+(iso===today?' today':'')+'" onclick="calSlotClick(event,\''+iso+'\','+hourH+')">'+blocks+'</div>';
  });

  let gut=""; for(let h=0;h<24;h++) gut+='<div class="cal-hour"><span>'+pad2(h)+':00</span></div>';
  const gridH=24*hourH;

  let html='<div class="cal cal-time" style="--n:'+n+';--gutter:'+gutter+'px;--hourH:'+hourH+'px">'
    +'<div class="cal-time-head">'+heads+'</div>'
    +'<div class="cal-allday"><div class="cal-allday-label">ganztägig</div><div class="cal-allday-lane" style="height:'+allH+'px">'+allBars+'</div></div>'
    +'<div class="cal-body"><div class="cal-grid" style="height:'+gridH+'px"><div class="cal-gutter">'+gut+'</div><div class="cal-cols">'+cols+'</div></div></div>'
    +'</div>';
  root.innerHTML=html;
  const body=root.querySelector(".cal-body");
  if(body){ const isToday=days.some(d=>toISO(d)===today); const sh=isToday?Math.max(0,new Date().getHours()-1):7; body.scrollTop=sh*hourH; }
}

function calSlotClick(ev,iso,hourH){

  let mins=Math.round((y/hourH*60)/30)*30; mins=Math.max(0,Math.min(23*60+30,mins));
  const start=iso+"T"+pad2(Math.floor(mins/60))+":"+pad2(mins%60);
  const e=new Date(fromISO(iso).getTime()+mins*60000+3600000);
  const end=toISO(e)+"T"+pad2(e.getHours())+":"+pad2(e.getMinutes());
  openBookingModal(null,{timed:true,start,end});
}

/* ---------- Einsätze-Liste ---------- */
function renderBookings(){
  const root=document.getElementById("bookingList");
  const nowMs=Date.now();
  let list=state.bookings.slice();
  if(ui.bFilter==="active") list=list.filter(b=> endMs(b)>nowMs || isOverdue(b));
  else if(ui.bFilter==="past") list=list.filter(b=>endMs(b)<=nowMs);
  if(ui.bSearch){ const q=ui.bSearch.toLowerCase();
    list=list.filter(b=>{ const a=assetById(b.assetId);
      return (b.location||"").toLowerCase().includes(q) || responsibleName(b).toLowerCase().includes(q) || (a&&(a.name||"").toLowerCase().includes(q)); }); }
  list.sort((a,b)=> startMs(a)-startMs(b));
  if(ui.bFilter==="past") list.reverse();

  if(list.length===0){
    root.innerHTML='<div class="empty-state"><h3>Keine Einsätze</h3><p>Lege einen neuen Einsatz an, um einen Verwendungsort und -zeitraum festzuhalten.</p><button class="btn amber" style="margin-top:10px" onclick="openBookingModal()">+ Einsatz anlegen</button></div>';
    return;
  }

  let html='<div class="section-h"><h2>'+(ui.bFilter==="past"?"Vergangene Einsätze":ui.bFilter==="all"?"Alle Einsätze":"Aktuelle & geplante Einsätze")+'</h2><span class="count">'+list.length+'</span></div><div class="blist">';
  list.forEach(b=>{
    const a=assetById(b.assetId)||{name:"(gelöschtes Gerät)",color:"#8A93A0"};
    const conf=bookingConflicts(b);
    const s=startMs(b), e=endMs(b);
    let pill="", pc="";
    if(b.returnedAt){ pill="zurück"; pc="ret"; }
    else if(isOverdue(b)){ pill="überfällig"; pc="overdue"; }
    else if(s<=nowMs && nowMs<e){ pill="Im Einsatz"; pc="now"; }
    else if(s>nowMs){ const hrs=(s-nowMs)/3600000;
      pill = hrs<24 ? ("in "+Math.max(1,Math.round(hrs))+" Std") : ("in "+Math.round(hrs/24)+" T");
      pc = hrs<=24*7 ? "soon" : ""; }
    else { pill="erledigt"; pc="past"; }
    html+='<div class="brow">'
      + '<div class="bar-swatch" style="background:'+a.color+'"></div>'
      + '<div class="b-main"><div class="b-loc">'+(conf?'⚠ ':'')+esc(b.location||"—")+(timed(b)?' <span class="pill tag">Uhrzeit</span>':'')+(pc?' <span class="pill '+pc+'">'+pill+'</span>':'')+'</div>'
      + '<div class="b-asset">'+esc(a.name)+(responsibleName(b)?' · '+esc(responsibleName(b)):'')+(b.note?' · '+esc(b.note):'')+'</div></div>'
      + '<div class="b-when">'+fmtRange(b)+'<div class="days">'+durLabel(b)+'</div></div>'
      + '<div class="b-actions">'+(isOverdue(b)?'<button class="btn ghost" title="Gerät freigeben" onclick="releaseBooking(\''+b.id+'\')">↩︎</button>':'')+'<button class="btn ghost" title="Bearbeiten" onclick="openBookingModal(\''+b.id+'\')">✏️</button></div></div>';
  });
  html+='</div>';
  root.innerHTML=html;
}

/* ---------- Geräte-Liste ---------- */
function renderAssets(){
  const root=document.getElementById("assetList");
  let list=state.assets.slice();
  if(ui.aType) list=list.filter(a=>a.type===ui.aType);
  if(ui.aSearch){ const q=ui.aSearch.toLowerCase(); list=list.filter(a=>(a.name||"").toLowerCase().includes(q)||(a.identifier||"").toLowerCase().includes(q)); }
  list.sort((a,b)=> (a.name||"").localeCompare(b.name||"","de"));

  if(list.length===0){
    root.innerHTML='<div class="empty-state"><h3>Keine Geräte</h3><p>Lege dein erstes Gerät oder Fahrzeug an.</p><button class="btn amber" style="margin-top:10px" onclick="openAssetModal()">+ Gerät anlegen</button></div>';

  const nowMs=Date.now();
  let html='<div class="section-h"><h2>Geräte & Fahrzeuge</h2><span class="count">'+list.length+'</span></div><div class="cards">';
  list.forEach(a=>{
    const bks=state.bookings.filter(b=>b.assetId===a.id);
    const out=bks.filter(b=> isOut(b)).sort((x,y)=> endMs(y)-endMs(x))[0];
    const upcoming=bks.filter(b=> startMs(b)>nowMs && !b.returnedAt).sort((x,y)=> startMs(x)-startMs(y))[0];
    let status='<span class="pill past">frei</span>';
    if(a.defect) status='<span class="pill defekt">🔧 Defekt'+(a.defectNote?': '+esc(a.defectNote):'')+'</span>';
    else if(out && isOverdue(out)) status='<span class="pill overdue">⏰ überfällig: '+esc(out.location)+'</span>';
    else if(out) status='<span class="pill now">im Einsatz: '+esc(out.location)+'</span>';
    else if(upcoming) status='<span class="pill soon">ab '+fmtStartShort(upcoming)+': '+esc(upcoming.location)+'</span>';
    html+='<div class="card'+(a.defect?' defect':'')+'"><div class="top"><span class="swatch" style="background:'+(a.color||'#475569')+'"></span>'
      + '<span class="nm">'+esc(a.name)+'</span><span class="badge">'+esc(a.type||"—")+'</span></div>'
      + '<div class="meta">'
      + (a.identifier?'<div><span class="k">Kennung</span><br>'+esc(a.identifier)+'</div>':'')
      + '<div>'+status+'</div>'
      + '<div><span class="k">Einsätze gesamt</span><br>'+bks.length+'</div>'
      + (a.note?'<div><span class="k">Notiz</span><br>'+esc(a.note)+'</div>':'')
      + '</div>'
      + '<div class="row-actions"><button class="btn ghost" onclick="openBookingModal(null,{assetId:\''+a.id+'\'})">+ Einsatz</button>'
      + '<button class="btn ghost" onclick="openDeviceQR(\''+a.id+'\')">QR-Code</button>'
      + '<button class="btn ghost" onclick="openAssetModal(\''+a.id+'\')">Bearbeiten</button></div></div>';
  });
  html+='</div>';
  root.innerHTML=html;
}

function saveResponsible(id){
  const name=modal.querySelector("#rName").value.trim();

    role:modal.querySelector("#rRole").value.trim(),
    phone:modal.querySelector("#rPhone").value.trim(),
    email:modal.querySelector("#rEmail").value.trim(),
    note:modal.querySelector("#rNote").value.trim(), updatedAt:now() };
  if(!state.responsibles) state.responsibles=[];
  if(id){ const i=state.responsibles.findIndex(r=>r.id===id); state.responsibles[i]=obj; }
  else state.responsibles.push(obj);
  closeModal(); toast(id?"Verantwortliche/r aktualisiert":"Verantwortliche/r angelegt","ok"); save();
}
function deleteResponsible(id){
  const cnt=state.bookings.filter(b=>b.responsibleId===id).length;
  if(!confirm("Verantwortliche/n wirklich löschen?"+(cnt?(" "+cnt+" Einsätze bleiben bestehen, verlieren aber die Zuordnung."):""))) return;
  (state.bookings||[]).forEach(b=>{ if(b.responsibleId===id){ b.responsibleId=null; b.updatedAt=now(); } });
  state.responsibles=(state.responsibles||[]).filter(r=>r.id!==id);
  state.tombstones.push({id,deletedAt:now()});
  closeModal(); toast("Verantwortliche/r gelöscht","ok"); save();
}

/* ===================== Status-Helfer (Rückgabe / Überfälligkeit) ===================== */
const OVERDUE_LOOKBACK_DAYS=30;
function isOut(b){ return !b.returnedAt && startMs(b)<=Date.now(); }
function isOverdue(b){ return !b.returnedAt && startMs(b)<=Date.now() && endMs(b)<=Date.now(); }
function currentOpenBooking(assetId){ const now=Date.now();
  return state.bookings.filter(b=> b.assetId===assetId && !b.returnedAt && startMs(b)<=now)
    .sort((x,y)=> endMs(y)-endMs(x))[0]; }
function overdueBookings(){ const now=Date.now(), min=now-OVERDUE_LOOKBACK_DAYS*86400000;
  return state.bookings.filter(b=> !b.returnedAt && endMs(b)<=now && endMs(b)>=min && startMs(b)<=now)
    .sort((x,y)=> endMs(x)-endMs(y)); }
function agoLabel(ms){ const h=ms/3600000; if(h<1) return Math.max(1,Math.round(ms/60000))+" Min"; if(h<48) return Math.round(h)+" Std"; return Math.round(h/24)+" Tagen"; }

/* ===================== Benachrichtigungen ===================== */
function renderNotifications(){
  const list=overdueBookings(), n=list.length;
  const cnt=document.getElementById("bellCount");
  if(cnt){ cnt.textContent=n>99?"99+":String(n); cnt.style.display=n?"":"none"; }
  const bn=document.getElementById("overdueBanner");
  if(bn){
    if(n>0){ bn.style.display="";
      document.getElementById("overdueBannerText").innerHTML='<b>'+n+' '+(n===1?'Gerät ist':'Geräte sind')+'</b> über die geplante Einsatzzeit hinaus nicht zurückgemeldet.'; }
    else bn.style.display="none";
  }
}
function openOverdueModal(){
  const list=overdueBookings();
  let rows = list.length ? list.map(b=>{
    const a=assetById(b.assetId)||{name:"(gelöscht)",color:"#8A93A0"};
    const over=Date.now()-endMs(b);
    return '<div class="od-row"><span class="swatch" style="background:'+(a.color||'#475569')+'"></span>'
      +'<div class="od-main"><div class="od-t">'+esc(a.name)+' · '+esc(b.location||'—')+'</div>'
      +'<div class="od-sub">geplant: '+esc(fmtRange(b))+' · <b>überfällig seit '+agoLabel(over)+'</b>'+(responsibleName(b)?' · '+esc(responsibleName(b)):'')+'</div></div>'
      +'<div class="od-act">'
        +'<button class="btn" onclick="extendBooking(\''+b.id+'\',1,\'overdue\')">+1 Tag</button>'
        +'<button class="btn primary" onclick="releaseBooking(\''+b.id+'\',\'overdue\')">Freigeben</button>'
        +'<button class="btn ghost" title="Bearbeiten" onclick="closeModal();openBookingModal(\''+b.id+'\')">✏️</button>'
      +'</div></div>';
  }).join("") : '<div class="empty-state" style="padding:26px"><h3>Keine offenen Rückgaben</h3><p>Alle Geräte sind innerhalb ihrer geplanten Zeit oder bereits zurückgemeldet.</p></div>';
  modal.innerHTML='<div class="modal-head"><h2>Offene Rückgaben'+(list.length?' ('+list.length+')':'')+'</h2><button class="close" onclick="closeModal()">×</button></div>'
    +'<div class="modal-body">'+(list.length?'<div class="hint" style="margin-bottom:8px">Diese Geräte sind über ihre geplante Einsatzzeit hinaus nicht zurückgemeldet. Verlängere den Zeitraum – oder gib das Gerät frei, sobald es im Lager ist.</div>':'')+rows+'</div>';
  overlay.classList.add("show");
}
function releaseBooking(id,ctx){
  const b=state.bookings.find(x=>x.id===id); if(!b) return;
  const d=new Date();
  if(timed(b)){ b.end=toISO(d)+"T"+pad2(d.getHours())+":"+pad2(d.getMinutes()); }
  else { let ed=toISO(d); if(fromISO(ed).getTime()<fromISO(sd(b)).getTime()) ed=sd(b); b.end=ed; }
  b.returnedAt=now(); b.updatedAt=now();
  const a=assetById(b.assetId);
  toast((a?a.name:"Gerät")+" freigegeben – Einsatz beendet.","ok");
  save();
  if(ctx==="overdue") openOverdueModal(); else closeModal();
}
function extendBooking(id,days,ctx){
  const b=state.bookings.find(x=>x.id===id); if(!b) return;
  if(timed(b)){ const e=new Date(endMs(b)+days*86400000); b.end=toISO(e)+"T"+pad2(e.getHours())+":"+pad2(e.getMinutes()); }
  else { b.end=toISO(addDays(fromISO(b.end),days)); }
  b.returnedAt=null; b.updatedAt=now();
  toast("Zeitraum um "+days+" Tag"+(days>1?"e":"")+" verlängert.","ok");
  save();
  if(ctx==="overdue") openOverdueModal(); else closeModal();
}
function openReturnModal(bid){
  const b=state.bookings.find(x=>x.id===bid);
  if(!b){ toast("Einsatz nicht gefunden.","err"); return; }
  const a=assetById(b.assetId)||{name:"(gelöscht)"};
  const over=isOverdue(b);
  modal.innerHTML=`
    <div class="modal-head"><h2>${esc(a.name)} ist im Einsatz</h2><button class="close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="conflict-note" style="${over?'':'display:none'}"><span>⏰</span><span>Die geplante Einsatzzeit ist überschritten.</span></div>
      <div class="ret-info">
        <div><span class="k">Verwendungsort</span><br>${esc(b.location||'—')}</div>
        <div><span class="k">Zeitraum</span><br>${esc(fmtRange(b))}</div>
        ${responsibleName(b)?'<div><span class="k">Verantwortlich</span><br>'+esc(responsibleName(b))+'</div>':''}
      </div>
      <p class="hint">Ist das Gerät zurück im Lager? Dann freigeben und den Einsatz beenden. Andernfalls den Zeitraum verlängern.</p>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal();openBookingModal('${b.id}')">Zeitraum verlängern</button>
      <div class="spacer" style="flex:1"></div>
      <button class="btn primary" onclick="releaseBooking('${b.id}','return')">Gerät freigeben &amp; beenden</button>
    </div>`;
  overlay.classList.add("show");
}

/* ===================== Kategorien ===================== */
function categoryNames(){
  const fromCat=(state.categories||[]).map(c=>c.name).filter(Boolean);
  const fromAssets=(state.assets||[]).map(a=>a.type).filter(Boolean);
  let names=[...new Set([...fromCat,...fromAssets])];
  if(names.length===0) names=TYPES.slice();
  return names.sort((a,b)=>a.localeCompare(b,"de"));
}
function renderCategories(){
  const root=document.getElementById("catList"); if(!root) return;
  let cats=(state.categories||[]).slice();
  if(ui.cSearch){ const q=ui.cSearch.toLowerCase(); cats=cats.filter(c=>(c.name||"").toLowerCase().includes(q)); }
  cats.sort((a,b)=>(a.name||"").localeCompare(b.name||"","de"));
  // Hinweis auf benutzte, aber (noch) nicht formal angelegte Typen
  const formal=new Set((state.categories||[]).map(c=>c.name));
  const orphan=[...new Set((state.assets||[]).map(a=>a.type).filter(t=>t&&!formal.has(t)))];
  if(cats.length===0){
    root.innerHTML='<div class="empty-state"><h3>Keine Kategorien</h3><p>Lege Gerätekategorien an (LKW, Bagger, Radlader …) – sie stehen dann im Geräte-Formular zur Auswahl.</p>'
      +'<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:10px"><button class="btn amber" onclick="seedDefaultCategories()">Standard-Kategorien anlegen</button><button class="btn" onclick="openCategoryModal()">+ Kategorie</button></div></div>';
    return;
  }
  let html='<div class="section-h"><h2>Kategorien</h2><span class="count">'+cats.length+'</span></div><div class="cards">';
  cats.forEach(c=>{
    const cnt=(state.assets||[]).filter(a=>a.type===c.name).length;
    html+='<div class="card"><div class="top"><span class="cat-ic">▦</span><span class="nm">'+esc(c.name)+'</span><span class="badge">'+cnt+' '+(cnt===1?'Gerät':'Geräte')+'</span></div>'
      +'<div class="row-actions"><button class="btn ghost" onclick="openCategoryModal(\''+c.id+'\')">Bearbeiten</button></div></div>';
  });
  html+='</div>';
  if(orphan.length) html+='<div class="hint" style="padding:10px 2px">Aus Geräten übernommen, noch nicht als Kategorie gespeichert: '+orphan.map(esc).join(", ")+'. <button class="btn" style="padding:4px 9px" onclick="adoptOrphans()">Übernehmen</button></div>';
  html+='<div style="padding:10px 2px"><button class="btn amber" onclick="openCategoryModal()">+ Kategorie</button></div>';
  root.innerHTML=html;
}
function seedDefaultCategories(){
  if(!state.categories) state.categories=[];
  const have=new Set(state.categories.map(c=>c.name.toLowerCase()));
  categoryNames().forEach(n=>{ if(!have.has(n.toLowerCase())){ state.categories.push({id:uid(),name:n,updatedAt:now()}); have.add(n.toLowerCase()); } });
  toast("Kategorien angelegt","ok"); save();
}
function adoptOrphans(){
  if(!state.categories) state.categories=[];
  const have=new Set(state.categories.map(c=>c.name.toLowerCase()));
  [...new Set((state.assets||[]).map(a=>a.type).filter(Boolean))].forEach(n=>{ if(!have.has(n.toLowerCase())){ state.categories.push({id:uid(),name:n,updatedAt:now()}); have.add(n.toLowerCase()); } });
  toast("Übernommen","ok"); save();
}
function openCategoryModal(id){
  const c=id? (state.categories||[]).find(x=>x.id===id):null;
  const used=c? (state.assets||[]).filter(a=>a.type===c.name).length : 0;
  modal.innerHTML=`
    <div class="modal-head"><h2>${c?"Kategorie bearbeiten":"Neue Kategorie"}</h2><button class="close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <label class="f">Bezeichnung <span class="req">*</span><input class="control" id="cName" placeholder="z. B. LKW, Bagger, Radlader" value="${c?esc(c.name):''}"></label>
      ${c&&used?'<div class="hint">'+used+' '+(used===1?'Gerät nutzt':'Geräte nutzen')+' diese Kategorie. Beim Umbenennen werden sie automatisch angepasst.</div>':''}
    </div>
    <div class="modal-foot">
      ${c?'<button class="btn danger" onclick="deleteCategory(\''+c.id+'\')">Löschen</button>':''}
      <div class="spacer" style="flex:1"></div>
      <button class="btn" onclick="closeModal()">Abbrechen</button>
      <button class="btn primary" onclick="saveCategory('${c?c.id:''}')">Speichern</button>
    </div>`;
  overlay.classList.add("show");
  setTimeout(()=>modal.querySelector("#cName").focus(),30);
}
function saveCategory(id){
  const name=modal.querySelector("#cName").value.trim();
  if(!name){ toast("Bitte eine Bezeichnung angeben.","err"); return; }
  if(!state.categories) state.categories=[];
  if(state.categories.some(c=>c.id!==id && (c.name||"").toLowerCase()===name.toLowerCase())){ toast("Diese Kategorie gibt es bereits.","err"); return; }
  if(id){ const c=state.categories.find(x=>x.id===id); const old=c.name; c.name=name; c.updatedAt=now();
    if(old!==name){ state.assets.forEach(a=>{ if(a.type===old){ a.type=name; a.updatedAt=now(); } }); } }
  else state.categories.push({id:uid(),name,updatedAt:now()});
  closeModal(); toast(id?"Kategorie aktualisiert":"Kategorie angelegt","ok"); save();
}
function deleteCategory(id){
  const c=(state.categories||[]).find(x=>x.id===id); if(!c) return;
  const used=(state.assets||[]).filter(a=>a.type===c.name);
  if(!confirm("Kategorie \""+c.name+"\" löschen?"+(used.length?(" "+used.length+" Geräte verlieren ihre Kategorie."):""))) return;
  used.forEach(a=>{ a.type=""; a.updatedAt=now(); });
  state.categories=state.categories.filter(x=>x.id!==id);
  state.tombstones.push({id,deletedAt:now()});
  closeModal(); toast("Kategorie gelöscht","ok"); save();
}


function populateTypeSelects(){
  const used=categoryNames();
  ["tlType","aType"].forEach(id=>{
    const sel=document.getElementById(id); const cur=sel.value;
    sel.innerHTML='<option value="">Alle Typen</option>'+used.map(t=>'<option>'+esc(t)+'</option>').join("");
    sel.value=cur;
  });
}
