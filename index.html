<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>BSB Tracking</title>
<style>
  :root{
    --bg:#F1EFEC;
    --panel:#FFFFFF;
    --ink:#231F20;          /* BSB-Schwarz (CI) */
    --ink-2:#5C5759;
    --ink-3:#948F90;
    --line:#DBD7D3;
    --line-2:#ECE9E5;
    --steel:#231F20;        /* Primär = CI-Schwarz */
    --steel-2:#3D3839;
    --hivis:#231F20;
    --hivis-ink:#231F20;
    --ok:#2C7A4B;
    --warn:#B23B1E;
    --weekend:#F5F3F0;
    --today:#231F20;
    --shadow:0 1px 2px rgba(20,23,28,.06), 0 8px 24px rgba(20,23,28,.08);
    --mono:ui-monospace,"SF Mono","Cascadia Mono","Roboto Mono","JetBrains Mono",Menlo,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --day-w:44px;
    --name-w:210px;
    --radius:10px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg);color:var(--ink);font-family:var(--sans);
    font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;
    display:flex;flex-direction:column;min-height:100dvh;
  }
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:14px}

  /* ---------- Kopfzeile ---------- */
  header{
    background:var(--panel);color:var(--ink);display:flex;align-items:center;gap:16px;
    padding:0 16px;height:62px;flex:0 0 auto;position:sticky;top:0;z-index:40;
    border-bottom:1px solid var(--line);
  }
  .brand{display:flex;align-items:center;gap:13px;text-decoration:none;color:inherit}
  .brand .logo{display:block;height:40px;color:var(--ink)}
  .brand .logo-svg{height:40px;width:auto;display:block}
  .brand-div{width:1px;height:30px;background:var(--line);flex:0 0 auto}
  .brand-label{font-weight:700;font-size:14px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink)}
  nav.tabs{display:flex;gap:2px;margin-left:6px}
  nav.tabs button{
    background:transparent;border:0;color:var(--ink-2);padding:8px 14px;border-radius:8px;
    font-weight:600;font-size:13px;transition:background .12s,color .12s;
  }
  nav.tabs button:hover{background:var(--bg);color:var(--ink)}
  nav.tabs button[aria-selected="true"]{background:var(--ink);color:#fff}
  .head-right{margin-left:auto;display:flex;align-items:center;gap:10px}
  .sync{
    display:flex;align-items:center;gap:8px;background:var(--panel);
    border:1px solid var(--line);border-radius:999px;padding:5px 12px 5px 10px;
    font-size:12px;color:var(--ink-2);cursor:pointer;font-weight:500;
  }
  .sync:hover{border-color:var(--ink-3)}
  .sync .dot{width:9px;height:9px;border-radius:50%;background:var(--ink-3);flex:0 0 auto}
  .sync.s-saved .dot,.sync.s-connected .dot{background:var(--ok);box-shadow:0 0 0 3px rgba(44,122,75,.22)}
  .sync.s-saving .dot,.sync.s-loading .dot{background:var(--ink);animation:pulse 1s infinite}
  .sync.s-error .dot{background:var(--warn)}
  .sync.s-off .dot{background:var(--ink-3)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
  .icon-btn{
    background:var(--panel);border:1px solid var(--line);color:var(--ink-2);
    width:36px;height:36px;border-radius:8px;display:grid;place-items:center;font-size:16px;
  }
  .icon-btn:hover{border-color:var(--ink-3);color:var(--ink)}

  /* ---------- Verbindungs-Banner ---------- */
  .banner{
    background:#F6F1E8;border-bottom:1px solid #E5DACA;color:#6E6457;
    padding:9px 16px;font-size:13px;display:flex;align-items:center;gap:10px;flex:0 0 auto;
  }
  .banner b{color:var(--ink)}
  .banner button{
    margin-left:auto;background:var(--steel);color:#fff;border:0;border-radius:7px;
    padding:6px 12px;font-weight:600;font-size:12px;
  }

  /* ---------- Werkzeugleiste ---------- */
  .toolbar{
    background:var(--panel);border-bottom:1px solid var(--line);
    padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex:0 0 auto;
  }
  .nav-range{display:flex;align-items:center;gap:2px;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:2px}
  .nav-range button{background:transparent;border:0;padding:6px 10px;border-radius:6px;font-weight:600;color:var(--ink-2)}
  .nav-range button:hover{background:#fff}
  .nav-range .today-btn{color:var(--steel)}
  .seg{display:inline-flex;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:2px}
  .seg button{background:transparent;border:0;padding:6px 11px;border-radius:6px;font-weight:600;font-size:13px;color:var(--ink-2)}
  .seg button[aria-pressed="true"]{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.08)}
  .field{display:flex;align-items:center;gap:7px;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:0 10px;height:36px}
  .field input,.field select{border:0;background:transparent;outline:none;color:var(--ink);height:34px}
  .field input::placeholder{color:var(--ink-3)}
  .spacer{flex:1}
  .btn{
    border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:8px;
    padding:8px 13px;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:7px;
  }
  .btn:hover{border-color:var(--ink-3)}
  .btn.primary{background:var(--steel);border-color:var(--steel);color:#fff}
  .btn.primary:hover{background:var(--steel-2)}
  .btn.amber{background:var(--steel);border-color:var(--steel);color:#fff}
  .btn.amber:hover{background:var(--steel-2)}
  .btn.ghost{background:transparent;border-color:transparent;color:var(--ink-2)}
  .btn.danger{color:var(--warn);border-color:#eccabf}
  .btn.danger:hover{background:#fdf2ee}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  /* ---------- Inhaltsbereich ---------- */
  main{flex:1;min-height:0;display:flex;flex-direction:column}
  .view{flex:1;min-height:0;display:none;flex-direction:column}
  .view.active{display:flex}

  /* ---------- Zeitstrahl ---------- */
  .timeline{flex:1;min-height:0;overflow:auto;background:var(--panel);position:relative}
  .tl-grid{display:grid;min-width:max-content}
  .tl-corner{
    position:sticky;left:0;top:0;z-index:30;background:var(--panel);
    border-right:2px solid var(--line);border-bottom:1px solid var(--line);
    width:var(--name-w);min-width:var(--name-w);display:flex;align-items:center;
    padding:0 14px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);
  }
  .tl-head{position:sticky;top:0;z-index:20;display:flex;background:var(--panel);border-bottom:1px solid var(--line)}
  .tl-day{
    width:var(--day-w);min-width:var(--day-w);flex:0 0 var(--day-w);
    padding:6px 0 5px;text-align:center;border-left:1px solid var(--line-2);
    font-family:var(--mono);
  }
  .tl-day.weekend{background:var(--weekend)}
  .tl-day .dow{font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.03em}
  .tl-day .dnum{font-size:13px;font-weight:600;color:var(--ink-2);font-variant-numeric:tabular-nums}
  .tl-day.today{background:rgba(35,31,32,.06)}
  .tl-day.today .dnum{color:var(--hivis-ink)}
  .tl-day.month-start{border-left:2px solid var(--ink-3)}
  .tl-day .mon{font-size:9px;color:var(--steel);font-weight:700;height:11px}

  .tl-rowname{
    position:sticky;left:0;z-index:10;background:var(--panel);
    border-right:2px solid var(--line);border-bottom:1px solid var(--line-2);
    width:var(--name-w);min-width:var(--name-w);padding:8px 12px;display:flex;align-items:center;gap:10px;
  }
  .tl-rowname .swatch{width:11px;height:11px;border-radius:3px;flex:0 0 auto}
  .tl-rowname .nm{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tl-rowname .tp{font-size:11px;color:var(--ink-3);font-family:var(--mono)}
  .tl-track{
    position:relative;border-bottom:1px solid var(--line-2);
    background-image:repeating-linear-gradient(to right, transparent 0, transparent calc(var(--day-w) - 1px), var(--line-2) calc(var(--day-w) - 1px), var(--line-2) var(--day-w));
    cursor:copy;
  }
  .tl-track .wk{position:absolute;top:0;bottom:0;background:var(--weekend);opacity:.7;pointer-events:none}
  .tl-track .today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--today);pointer-events:none;z-index:2}
  .bar{
    position:absolute;height:24px;border-radius:6px;display:flex;align-items:center;
    padding:0 8px;color:#fff;font-size:12px;font-weight:600;overflow:hidden;white-space:nowrap;
    box-shadow:0 1px 2px rgba(0,0,0,.18);cursor:pointer;z-index:3;
    text-shadow:0 1px 1px rgba(0,0,0,.25);border:1px solid rgba(0,0,0,.08);
  }
  .bar:hover{filter:brightness(1.08);box-shadow:0 2px 8px rgba(0,0,0,.25)}
  .bar .loc{overflow:hidden;text-overflow:ellipsis}
  .bar.conflict{box-shadow:0 0 0 2px var(--warn),0 1px 2px rgba(0,0,0,.2)}
  .bar .clip-l{border-top-left-radius:0;border-bottom-left-radius:0}
  .empty-tl{padding:50px 20px;text-align:center;color:var(--ink-3);position:sticky;left:0;max-width:520px;margin:0 auto}
  .empty-tl h3{color:var(--ink-2);margin:0 0 6px}

  /* ---------- Listen / Karten ---------- */
  .scroll{flex:1;min-height:0;overflow:auto;padding:18px 16px 60px}
  .wrap{max-width:980px;margin:0 auto}
  .section-h{display:flex;align-items:center;gap:10px;margin:4px 2px 14px}
  .section-h h2{font-size:16px;margin:0}
  .count{font-size:12px;color:var(--ink-3);background:var(--bg);border:1px solid var(--line);border-radius:999px;padding:2px 9px;font-family:var(--mono)}

  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}
  .card .top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .card .swatch{width:14px;height:14px;border-radius:4px;flex:0 0 auto}
  .card .nm{font-weight:700;font-size:15px}
  .card .badge{margin-left:auto;font-size:11px;font-family:var(--mono);color:var(--ink-2);background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:2px 7px}
  .card .meta{font-size:13px;color:var(--ink-2);display:grid;gap:4px}
  .card .meta .k{color:var(--ink-3);font-size:11px;text-transform:uppercase;letter-spacing:.04em}
  .card .row-actions{display:flex;gap:6px;margin-top:12px;padding-top:11px;border-top:1px solid var(--line-2)}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-family:var(--mono);padding:2px 8px;border-radius:999px;border:1px solid var(--line)}
  .pill.now{background:#e9f6ee;border-color:#bfe3cd;color:#176a3a}
  .pill.soon{background:#F4EFE6;border-color:#E3D8C6;color:#6E6457}
  .pill.past{background:var(--bg);color:var(--ink-3)}

  .blist{display:grid;gap:9px}
  .brow{
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:12px 14px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);
  }
  .brow .bar-swatch{width:6px;align-self:stretch;border-radius:3px;flex:0 0 auto}
  .brow .b-main{min-width:0;flex:1}
  .brow .b-loc{font-weight:700;font-size:14px}
  .brow .b-asset{font-size:12px;color:var(--ink-2)}
  .brow .b-when{font-family:var(--mono);font-size:13px;text-align:right;color:var(--ink-2);white-space:nowrap}
  .brow .b-when .days{font-size:11px;color:var(--ink-3)}
  .brow .b-actions{display:flex;gap:6px}
  .day-divider{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);margin:14px 2px 4px}
  .empty-state{text-align:center;color:var(--ink-3);padding:60px 20px}
  .empty-state h3{color:var(--ink-2);margin:0 0 6px}

  /* ---------- Modal ---------- */
  .overlay{position:fixed;inset:0;background:rgba(14,17,22,.5);backdrop-filter:blur(2px);z-index:60;display:none;align-items:flex-start;justify-content:center;padding:24px 16px;overflow:auto}
  .overlay.show{display:flex}
  .modal{background:var(--panel);border-radius:14px;box-shadow:0 24px 60px rgba(0,0,0,.32);width:100%;max-width:520px;margin:auto;overflow:hidden;animation:pop .14s ease-out}
  @keyframes pop{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}
  .modal h2{margin:0;font-size:17px}
  .modal-head{padding:16px 18px;border-bottom:1px solid var(--line-2);display:flex;align-items:center;gap:10px}
  .modal-head .close{margin-left:auto;background:none;border:0;font-size:20px;color:var(--ink-3);width:30px;height:30px;border-radius:7px}
  .modal-head .close:hover{background:var(--bg);color:var(--ink)}
  .modal-body{padding:18px;display:grid;gap:14px;max-height:70vh;overflow:auto}
  .modal-foot{padding:14px 18px;border-top:1px solid var(--line-2);display:flex;gap:8px;align-items:center}
  label.f{display:grid;gap:5px;font-size:12px;font-weight:600;color:var(--ink-2)}
  label.f .req{color:var(--warn)}
  .control{
    border:1px solid var(--line);border-radius:9px;padding:9px 11px;background:#fff;color:var(--ink);width:100%;outline:none;
  }
  .control:focus{border-color:var(--steel);box-shadow:0 0 0 3px rgba(31,58,95,.12)}
  textarea.control{resize:vertical;min-height:62px}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .hint{font-size:12px;color:var(--ink-3);line-height:1.5}
  .hint a{color:var(--steel)}
  .swatches{display:flex;gap:7px;flex-wrap:wrap}
  .swatches button{width:26px;height:26px;border-radius:7px;border:2px solid transparent}
  .swatches button[aria-pressed="true"]{border-color:var(--ink);box-shadow:0 0 0 2px #fff inset}
  .conflict-note{background:#fdf2ee;border:1px solid #eccabf;color:var(--warn);border-radius:9px;padding:9px 11px;font-size:12.5px;display:flex;gap:8px;align-items:flex-start}
  .ok-note{background:#eef8f1;border:1px solid #bfe3cd;color:#176a3a;border-radius:9px;padding:9px 11px;font-size:12.5px}
  .kbd{font-family:var(--mono);font-size:11px;background:var(--bg);border:1px solid var(--line);border-radius:5px;padding:1px 6px}
  .steps{counter-reset:s;display:grid;gap:9px;margin:0;padding:0;list-style:none}
  .steps li{position:relative;padding-left:30px;font-size:12.5px;color:var(--ink-2)}
  .steps li::before{counter-increment:s;content:counter(s);position:absolute;left:0;top:0;width:21px;height:21px;border-radius:50%;background:var(--steel);color:#fff;font-size:11px;font-weight:700;display:grid;place-items:center}

  /* ---------- Toast ---------- */
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 10px 30px rgba(0,0,0,.3);z-index:80;opacity:0;transition:.22s;display:flex;gap:9px;align-items:center}
  .toast.show{transform:translateX(-50%);opacity:1}
  .toast.err{background:var(--warn)}
  .toast.ok{background:var(--ok)}

.tl-corner.intraday-corner{font-family:var(--mono);font-size:12.5px;font-weight:700;color:var(--ink);letter-spacing:0;text-transform:none}
  .tl-hour{width:var(--hour-w,60px);min-width:var(--hour-w,60px);flex:0 0 var(--hour-w,60px);padding:7px 0 6px;border-left:1px solid var(--line-2);font-family:var(--mono);color:var(--ink-3);font-size:11px}
  .tl-hour span{padding-left:5px}
  .tl-hour.now{background:rgba(35,31,32,.06);color:var(--ink)}
  .tl-track.intraday{cursor:copy;background-image:repeating-linear-gradient(to right, transparent 0 calc(var(--hour-w,60px) - 1px), var(--line-2) calc(var(--hour-w,60px) - 1px), var(--line-2) var(--hour-w,60px))}
  .tl-track.intraday .now-line{position:absolute;top:0;bottom:0;width:2px;background:var(--warn);z-index:4;pointer-events:none}
  .bar.allday{background-image:repeating-linear-gradient(45deg, rgba(255,255,255,.16) 0 6px, transparent 6px 12px)}
  .modal-seg{width:100%}
  .modal-seg button{flex:1}
  .quick-dur{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:10px;font-size:12px;color:var(--ink-3)}
  .quick-dur button{border:1px solid var(--line);background:var(--panel);border-radius:7px;padding:5px 9px;font-size:12px;font-weight:600;color:var(--ink-2)}
  .quick-dur button:hover{border-color:var(--ink);color:var(--ink)}
  .pill.tag{background:var(--bg);border-color:var(--line);color:var(--ink-2)}
  @media (max-width:680px){
    :root{--name-w:140px;--day-w:40px}
    .brand-label,.brand-div{display:none}
    .brand .logo,.brand .logo-svg{height:32px}
    nav.tabs button{padding:7px 10px}
    .toolbar{gap:7px}
    .sync .label{display:none}
    .grid-2{grid-template-columns:1fr}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important}}
</style>
</head>

/* ---------- Hilfsfunktionen: Datum ---------- */
function startOfDay(d){ const x=new Date(d); x.setHours(0,0,0,0); return x; }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function diffDays(a,b){ return Math.round((startOfDay(b)-startOfDay(a))/86400000); }
function todayStr(){ return toISO(new Date()); }
function toISO(d){ const x=startOfDay(d); const m=String(x.getMonth()+1).padStart(2,"0"); const day=String(x.getDate()).padStart(2,"0"); return x.getFullYear()+"-"+m+"-"+day; }
function fromISO(s){ const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); }
function fmtDE(s){ const d=fromISO(s); return String(d.getDate()).padStart(2,"0")+"."+String(d.getMonth()+1).padStart(2,"0")+"."+d.getFullYear(); }
function fmtShort(s){ const d=fromISO(s); return String(d.getDate()).padStart(2,"0")+"."+String(d.getMonth()+1).padStart(2,"0")+"."; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }
function now(){ return new Date().toISOString(); }
function pad2(n){ return String(n).padStart(2,"0"); }
/* ---------- Buchungshelfer: ganztägig ODER mit Uhrzeit ---------- */
function timed(b){ return b.allDay===false || (b.start||"").includes("T"); }
function startMs(b){ const s=b.start||""; return s.includes("T")? new Date(s).getTime() : fromISO(s).getTime(); }
function endMs(b){ const e=b.end||""; return e.includes("T")? new Date(e).getTime() : fromISO(e).getTime()+86400000; }
function sd(b){ return (b.start||"").slice(0,10); }
function ed(b){ return (b.end||"").slice(0,10); }
function hhmm(dt){ const d=new Date(dt); return pad2(d.getHours())+":"+pad2(d.getMinutes()); }
function fmtRange(b){
  if(timed(b)){ return sd(b)===ed(b)
    ? fmtShort(sd(b))+" "+hhmm(b.start)+"–"+hhmm(b.end)
    : fmtShort(sd(b))+" "+hhmm(b.start)+" – "+fmtShort(ed(b))+" "+hhmm(b.end); }
  return sd(b)===ed(b)? fmtShort(sd(b)) : fmtShort(sd(b))+"–"+fmtShort(ed(b));
}
function fmtStartShort(b){ return timed(b)? fmtShort(sd(b))+" "+hhmm(b.start) : fmtShort(sd(b)); }
function durLabel(b){
  if(timed(b)){ const h=(endMs(b)-startMs(b))/3600000;
    return h<24? (Math.round(h*10)/10).toString().replace(".",",")+" Std"
               : (Math.round(h/24*10)/10).toString().replace(".",",")+" Tage"; }
  const d=diffDays(fromISO(sd(b)),fromISO(ed(b)))+1; return d+" Tag"+(d>1?"e":"");
}

/* ---------- Base64 (UTF-8-sicher) ---------- */
function utf8ToB64(str){
  const bytes=new TextEncoder().encode(str); let bin=""; const ch=0x8000;
  for(let i=0;i<bytes.length;i+=ch){ bin+=String.fromCharCode.apply(null,bytes.subarray(i,i+ch)); }
  return btoa(bin);
}
function b64ToUtf8(b64){
  const clean=b64.replace(/\s/g,""); const bin=atob(clean);
  const bytes=Uint8Array.from(bin,c=>c.charCodeAt(0));
  return new TextDecoder().decode(bytes);
}

/* ---------- GitHub-API ---------- */
function ghUrl(){
  return "https://api.github.com/repos/"+encodeURIComponent(cfg.owner)+"/"+encodeURIComponent(cfg.repo)
       + "/contents/"+cfg.path.split("/").map(encodeURIComponent).join("/");
}
function ghHeaders(){
  return {
    "Authorization":"Bearer "+cfg.token,
    "Accept":"application/vnd.github+json",
    "X-GitHub-Api-Version":"2022-11-28"
  };
}
async function ghGet(){
  const res = await fetch(ghUrl()+"?ref="+encodeURIComponent(cfg.branch)+"&t="+Date.now(), { headers: ghHeaders(), cache:"no-store" });
  if(res.status===404) return { status:404 };
  if(res.status===401 || res.status===403) throw new Error("Zugriff verweigert – Token oder Berechtigungen prüfen ("+res.status+").");
  if(!res.ok) throw new Error("Laden fehlgeschlagen ("+res.status+").");
  const body = await res.json();
  return { status:200, content:b64ToUtf8(body.content), sha:body.sha };
}
async function ghPut(content, sha){
  const payload = { message:"BSB Tracking – Aktualisierung "+now(), content:utf8ToB64(content), branch:cfg.branch };
  if(sha) payload.sha = sha;
  const res = await fetch(ghUrl(), { method:"PUT", headers:{...ghHeaders(),"Content-Type":"application/json"}, body:JSON.stringify(payload) });
  if(res.status===409) return { conflict:true };
  if(res.status===401 || res.status===403) throw new Error("Speichern verweigert – Token braucht Schreibrecht (Contents: read/write).");
  if(!res.ok){ let m=""; try{ m=(await res.json()).message||""; }catch(e){} throw new Error("Speichern fehlgeschlagen ("+res.status+") "+m); }
  return await res.json();
}

/* ---------- Merge (mehrere Geräte, letzte Änderung gewinnt) ---------- */
function emptyData(){ return { assets:[], bookings:[], tombstones:[], updatedAt:null }; }
function mergeStates(a,b){
  const tomb={};
  [...(a.tombstones||[]),...(b.tombstones||[])].forEach(t=>{ if(!tomb[t.id]||t.deletedAt>tomb[t.id]) tomb[t.id]=t.deletedAt; });
  function mergeList(la,lb){
    const m={};
    [...(la||[]),...(lb||[])].forEach(it=>{ const ex=m[it.id]; if(!ex||(it.updatedAt||"")>(ex.updatedAt||"")) m[it.id]=it; });
    return Object.values(m).filter(it=> !(tomb[it.id] && tomb[it.id] >= (it.updatedAt||"")));
  }
  return {
    assets: mergeList(a.assets,b.assets),
    bookings: mergeList(a.bookings,b.bookings),
    tombstones: Object.entries(tomb).map(([id,deletedAt])=>({id,deletedAt})),
    updatedAt: now()
  };
}

/* ---------- Laden / Speichern ---------- */
function loadConfig(){
  try{ const s=JSON.parse(localStorage.getItem(CFG_KEY)||"{}"); cfg={...cfg,...s}; }catch(e){}
}
function saveConfig(){ localStorage.setItem(CFG_KEY, JSON.stringify(cfg)); }
function isConfigured(){ return cfg.owner && cfg.repo && cfg.path && cfg.token; }

async function pull(silent){
  if(!isConfigured()) return;
  if(!silent) setSync("loading","Lädt …");
  try{
    const r = await ghGet();
    if(r.status===404){ state=emptyData(); remoteSha=null; }
    else { const d=JSON.parse(r.content||"{}"); state={...emptyData(),...d}; remoteSha=r.sha; }
    connected=true; lastPull=Date.now();
    setSync("connected","Verbunden");
    renderAll();
  }catch(e){
    connected=false; setSync("error", e.message);
    if(!silent) toast(e.message,"err");
  }
}

let saveQueued=false, saving=false;
async function save(){
  renderAll(); // optimistische lokale Anzeige
  if(!isConfigured()){ updateBanner(); return; }
  if(saving){ saveQueued=true; return; }
  saving=true; setSync("saving","Speichert …");
  try{
    let tries=0;
    while(true){
      tries++;
      const r = await ghGet();
      let remote = emptyData(), sha=null;
      if(r.status===200){ remote=JSON.parse(r.content||"{}"); sha=r.sha; }
      const merged = mergeStates(remote, state);
      state = merged;
      const put = await ghPut(JSON.stringify(merged,null,2), sha);
      if(put.conflict){ if(tries<3) continue; throw new Error("Konflikt – bitte erneut versuchen."); }
      remoteSha = put.content.sha; lastPull=Date.now(); connected=true;
      break;
    }
    setSync("saved","Gespeichert");
    renderAll();
  }catch(e){
    connected = isConfigured(); setSync("error", e.message); toast(e.message,"err");
  } finally {
    saving=false;
    if(saveQueued){ saveQueued=false; save(); }
  }
}

function assetById(id){ return state.assets.find(a=>a.id===id); }
function activeAssets(){ return state.assets.filter(a=>a.active!==false); }

function bookingConflicts(bk){
  const s=startMs(bk), e=endMs(bk);
  return state.bookings.some(o=> o.id!==bk.id && o.assetId===bk.assetId && startMs(o)<e && s<endMs(o));
}

function renderAll(){
  populateTypeSelects();
  renderTimeline();
  renderBookings();
  renderAssets();
}

/* ---------- Zeitstrahl ---------- */
function tlAssets(){
  let assets=activeAssets();
  if(ui.tlType) assets=assets.filter(a=>a.type===ui.tlType);
  if(ui.tlSearch){ const q=ui.tlSearch.toLowerCase();
    assets=assets.filter(a=>(a.name||"").toLowerCase().includes(q) ||
      state.bookings.some(b=>b.assetId===a.id && (b.location||"").toLowerCase().includes(q))); }
  return assets;
}
function tlRowName(a){
  return '<div class="tl-rowname"><span class="swatch" style="background:'+(a.color||'#475569')+'"></span>'
    + '<div style="min-width:0"><div class="nm">'+esc(a.name)+'</div><div class="tp">'+esc(a.type||"")+(a.identifier?' · '+esc(a.identifier):'')+'</div></div></div>';
}
function tlEmptyAssets(){ return '<div class="empty-tl"><h3>Noch keine Geräte angelegt</h3><p>Lege LKWs, Bagger oder Maschinen an, um ihre Einsätze auf dem Zeitstrahl zu sehen.</p><button class="btn amber" onclick="openAssetModal()">+ Erstes Gerät anlegen</button></div>'; }
function tlEmptyFilter(){ return '<div class="empty-tl"><h3>Keine Treffer</h3><p>Filter oder Suche anpassen, um Geräte anzuzeigen.</p></div>'; }

function laneify(bks){
  bks.forEach(b=>{ b._s=startMs(b); b._e=endMs(b); });
  bks.sort((x,y)=> x._s-y._s);
  const lanes=[];
  bks.forEach(b=>{ let placed=false;
    for(const l of lanes){ if(l[l.length-1]._e<=b._s){ l.push(b); b._lane=lanes.indexOf(l); placed=true; break; } }
    if(!placed){ b._lane=lanes.length; lanes.push([b]); } });
  return Math.max(1,lanes.length);
}

function renderTimeline(){
  if(tl.mode==="intraday") return renderIntraday();
  const root=document.getElementById("timeline");
  document.documentElement.style.setProperty("--name-w", tl.days>=90? "180px":"210px");
  if(state.assets.length===0){ root.innerHTML=tlEmptyAssets(); return; }
  const assets=tlAssets();

  const days=[]; for(let i=0;i<tl.days;i++){ days.push(addDays(tl.start,i)); }
  const dayW = tl.days>=90?28:44;
  document.documentElement.style.setProperty("--day-w", dayW+"px");
  const today=todayStr();

  let head='<div class="tl-corner">Gerät / Fahrzeug</div><div class="tl-head">';
  days.forEach(d=>{
    const iso=toISO(d), dow=d.getDay(), wknd=(dow===0||dow===6), monStart=d.getDate()===1;
    head+='<div class="tl-day'+(wknd?' weekend':'')+(iso===today?' today':'')+(monStart?' month-start':'')+'">'
        + '<div class="mon">'+(monStart||d.getDate()<=1?MONTHS[d.getMonth()]:'')+'</div>'
        + '<div class="dow">'+DOW[dow]+'</div>'
        + '<div class="dnum">'+pad2(d.getDate())+'</div></div>';
  });
  head+='</div>';

  let rows="";
  assets.forEach(a=>{
    let bks=state.bookings.filter(b=>b.assetId===a.id)
      .filter(b=> fromISO(ed(b))>=tl.start && fromISO(sd(b))<addDays(tl.start,tl.days));
    const laneCount=laneify(bks);
    const rowH=laneCount*28+10;

    let bars="";
    days.forEach((d,i)=>{ if(d.getDay()===0||d.getDay()===6) bars+='<div class="wk" style="left:'+(i*dayW)+'px;width:'+dayW+'px"></div>'; });
    const tIdx=diffDays(tl.start,fromISO(today));
    if(tIdx>=0 && tIdx<tl.days) bars+='<div class="today-line" style="left:'+(tIdx*dayW+(new Date().getHours()/24*dayW))+'px"></div>';

    bks.forEach(b=>{
      const sOff=Math.max(0,diffDays(tl.start,fromISO(sd(b))));
      const eOff=Math.min(tl.days-1,diffDays(tl.start,fromISO(ed(b))));
      const left=sOff*dayW;
      const width=Math.max(dayW-3,(eOff-sOff+1)*dayW-3);
      const clippedLeft=fromISO(sd(b))<tl.start;
      const conf=bookingConflicts(b), tm=timed(b);
      const label=(conf?'⚠ ':'')+(tm? hhmm(b.start)+' ':'')+esc(b.location||"—");
      bars+='<div class="bar'+(conf?' conflict':'')+(clippedLeft?' clip-l':'')+(tm?' timed':'')+'" '
          + 'style="left:'+left+'px;width:'+width+'px;top:'+(b._lane*28+5)+'px;background:'+(a.color||'#475569')+'" '
          + 'onclick="event.stopPropagation();openBookingModal(\''+b.id+'\')" '
          + 'title="'+esc(b.location)+' · '+fmtRange(b)+(b.responsible?' · '+esc(b.responsible):'')+(conf?' · DOPPELBELEGUNG':'')+'">'
          + '<span class="loc">'+label+'</span></div>';
    });

    rows+=tlRowName(a)
        + '<div class="tl-track" style="height:'+rowH+'px;width:'+(tl.days*dayW)+'px" data-asset="'+a.id+'" onclick="trackClick(event,\''+a.id+'\')">'+bars+'</div>';
  });

  root.innerHTML = assets.length===0 ? tlEmptyFilter()
    : '<div class="tl-grid" style="grid-template-columns:var(--name-w) 1fr">'+head+rows+'</div>';

  if(!root._scrolled){ root.scrollLeft=Math.max(0,(diffDays(tl.start,new Date())*dayW)-120); root._scrolled=true; }
}

/* ---------- Tagesansicht mit Stundenraster (Intraday) ---------- */
function renderIntraday(){
  const root=document.getElementById("timeline");
  document.documentElement.style.setProperty("--name-w","180px");
  if(state.assets.length===0){ root.innerHTML=tlEmptyAssets(); return; }
  const assets=tlAssets();
  const dayStart=tl.start.getTime(), dayEnd=dayStart+86400000, dayISO=toISO(tl.start);
  const hourW=60; document.documentElement.style.setProperty("--hour-w", hourW+"px");
  const isToday=dayISO===todayStr(), nowMs=Date.now();

  let head='<div class="tl-corner intraday-corner">'+DOW[tl.start.getDay()]+' '+fmtDE(dayISO)+'</div><div class="tl-head">';
  for(let h=0;h<24;h++){ head+='<div class="tl-hour'+(isToday&&h===new Date().getHours()?' now':'')+'"><span>'+pad2(h)+'</span></div>'; }
  head+='</div>';

  let rows="";
  assets.forEach(a=>{
    let bks=state.bookings.filter(b=>b.assetId===a.id).filter(b=> endMs(b)>dayStart && startMs(b)<dayEnd);
    const laneCount=laneify(bks);
    const rowH=laneCount*30+10;

    let bars="";
    if(isToday && nowMs>=dayStart && nowMs<dayEnd) bars+='<div class="now-line" style="left:'+(((nowMs-dayStart)/3600000)*hourW)+'px"></div>';
    bks.forEach(b=>{
      const s=Math.max(dayStart,b._s), e=Math.min(dayEnd,b._e);
      const left=((s-dayStart)/3600000)*hourW;
      const width=Math.max(16,((e-s)/3600000)*hourW-2);
      const conf=bookingConflicts(b), tm=timed(b);
      const label=(conf?'⚠ ':'')+(tm? hhmm(b.start)+'–'+hhmm(b.end)+' ' : 'Ganztägig ')+esc(b.location||"—");
      bars+='<div class="bar'+(conf?' conflict':'')+(tm?' timed':' allday')+'" '
          + 'style="left:'+left+'px;width:'+width+'px;top:'+(b._lane*30+5)+'px;background:'+(a.color||'#475569')+'" '
          + 'onclick="event.stopPropagation();openBookingModal(\''+b.id+'\')" '
          + 'title="'+esc(b.location)+' · '+fmtRange(b)+(b.responsible?' · '+esc(b.responsible):'')+(conf?' · DOPPELBELEGUNG':'')+'">'
          + '<span class="loc">'+label+'</span></div>';
    });

    rows+=tlRowName(a)
        + '<div class="tl-track intraday" style="height:'+rowH+'px;width:'+(24*hourW)+'px" onclick="intradayClick(event,\''+a.id+'\')">'+bars+'</div>';
  });

  root.innerHTML = assets.length===0 ? tlEmptyFilter()
    : '<div class="tl-grid" style="grid-template-columns:var(--name-w) 1fr">'+head+rows+'</div>';

  if(!root._scrolled){ const sh=isToday? Math.max(0,new Date().getHours()-1):6; root.scrollLeft=sh*hourW; root._scrolled=true; }
}
function intradayClick(ev,assetId){
  const track=ev.currentTarget, x=ev.clientX-track.getBoundingClientRect().left, hourW=60;
  let mins=Math.round(((x/hourW)*60)/30)*30; mins=Math.max(0,Math.min(23*60+30,mins));
  const dayISO=toISO(tl.start);
  const start=dayISO+'T'+pad2(Math.floor(mins/60))+':'+pad2(mins%60);
  const e=new Date(tl.start.getTime()+mins*60000+3600000);
  const end=toISO(e)+'T'+pad2(e.getHours())+':'+pad2(e.getMinutes());
  openBookingModal(null,{assetId,timed:true,start,end});
}

function trackClick(ev,assetId){
  const track=ev.currentTarget;
  const x=ev.clientX-track.getBoundingClientRect().left;
  const dayW=tl.days>=90?28:44;
  const dayOffset=Math.floor(x/dayW);
  const iso=toISO(addDays(tl.start,dayOffset));
  openBookingModal(null,{assetId,start:iso,end:iso});
}

/* ---------- Einsätze-Liste ---------- */
function renderBookings(){
  const root=document.getElementById("bookingList");
  const nowMs=Date.now();
  let list=state.bookings.slice();
  if(ui.bFilter==="active") list=list.filter(b=>endMs(b)>nowMs);
  else if(ui.bFilter==="past") list=list.filter(b=>endMs(b)<=nowMs);
  if(ui.bSearch){ const q=ui.bSearch.toLowerCase();
    list=list.filter(b=>{ const a=assetById(b.assetId);
      return (b.location||"").toLowerCase().includes(q) || (b.responsible||"").toLowerCase().includes(q) || (a&&(a.name||"").toLowerCase().includes(q)); }); }
  list.sort((a,b)=> startMs(a)-startMs(b));
  if(ui.bFilter==="past") list.reverse();

  if(list.length===0){
    root.innerHTML='<div class="empty-state"><h3>Keine Einsätze</h3><p>Lege einen neuen Einsatz an, um einen Verwendungsort und -zeitraum festzuhalten.</p><button class="btn amber" style="margin-top:10px" onclick="openBookingModal()">+ Einsatz anlegen</button></div>';
    return;
  }

  let html='<div class="section-h"><h2>'+(ui.bFilter==="past"?"Vergangene Einsätze":ui.bFilter==="all"?"Alle Einsätze":"Aktuelle & geplante Einsätze")+'</h2><span class="count">'+list.length+'</span></div><div class="blist">';
  list.forEach(b=>{
    const a=assetById(b.assetId)||{name:"(gelöschtes Gerät)",color:"#8A93A0"};
    const conf=bookingConflicts(b);
    const s=startMs(b), e=endMs(b);
    let pill="", pc="";
    if(s<=nowMs && nowMs<e){ pill="Im Einsatz"; pc="now"; }
    else if(s>nowMs){ const hrs=(s-nowMs)/3600000;
      pill = hrs<24 ? ("in "+Math.max(1,Math.round(hrs))+" Std") : ("in "+Math.round(hrs/24)+" T");
      pc = hrs<=24*7 ? "soon" : ""; }
    else { pill="erledigt"; pc="past"; }
    html+='<div class="brow">'
      + '<div class="bar-swatch" style="background:'+a.color+'"></div>'
      + '<div class="b-main"><div class="b-loc">'+(conf?'⚠ ':'')+esc(b.location||"—")+(timed(b)?' <span class="pill tag">Uhrzeit</span>':'')+(pc?' <span class="pill '+pc+'">'+pill+'</span>':'')+'</div>'
      + '<div class="b-asset">'+esc(a.name)+(b.responsible?' · '+esc(b.responsible):'')+(b.note?' · '+esc(b.note):'')+'</div></div>'
      + '<div class="b-when">'+fmtRange(b)+'<div class="days">'+durLabel(b)+'</div></div>'
      + '<div class="b-actions"><button class="btn ghost" title="Bearbeiten" onclick="openBookingModal(\''+b.id+'\')">✏️</button></div></div>';
  });
  html+='</div>';
  root.innerHTML=html;
}

/* ---------- Geräte-Liste ---------- */
function renderAssets(){
  const root=document.getElementById("assetList");
  let list=state.assets.slice();
  if(ui.aType) list=list.filter(a=>a.type===ui.aType);
  if(ui.aSearch){ const q=ui.aSearch.toLowerCase(); list=list.filter(a=>(a.name||"").toLowerCase().includes(q)||(a.identifier||"").toLowerCase().includes(q)); }
  list.sort((a,b)=> (a.name||"").localeCompare(b.name||"","de"));

  if(list.length===0){
    root.innerHTML='<div class="empty-state"><h3>Keine Geräte</h3><p>Lege dein erstes Gerät oder Fahrzeug an.</p><button class="btn amber" style="margin-top:10px" onclick="openAssetModal()">+ Gerät anlegen</button></div>';
    return;
  }
  const nowMs=Date.now();
  let html='<div class="section-h"><h2>Geräte & Fahrzeuge</h2><span class="count">'+list.length+'</span></div><div class="cards">';
  list.forEach(a=>{
    const bks=state.bookings.filter(b=>b.assetId===a.id);
    const current=bks.find(b=> startMs(b)<=nowMs && nowMs<endMs(b));
    const upcoming=bks.filter(b=> startMs(b)>nowMs).sort((x,y)=> startMs(x)-startMs(y))[0];
    let status='<span class="pill past">frei</span>';
    if(current) status='<span class="pill now">im Einsatz: '+esc(current.location)+'</span>';
    else if(upcoming) status='<span class="pill soon">ab '+fmtStartShort(upcoming)+': '+esc(upcoming.location)+'</span>';
    html+='<div class="card"><div class="top"><span class="swatch" style="background:'+(a.color||'#475569')+'"></span>'
      + '<span class="nm">'+esc(a.name)+'</span><span class="badge">'+esc(a.type||"—")+'</span></div>'
      + '<div class="meta">'
      + (a.identifier?'<div><span class="k">Kennung</span><br>'+esc(a.identifier)+'</div>':'')
      + '<div>'+status+'</div>'
      + '<div><span class="k">Einsätze gesamt</span><br>'+bks.length+'</div>'
      + (a.note?'<div><span class="k">Notiz</span><br>'+esc(a.note)+'</div>':'')
      + '</div>'
      + '<div class="row-actions"><button class="btn ghost" onclick="openBookingModal(null,{assetId:\''+a.id+'\'})">+ Einsatz</button>'
      + '<button class="btn ghost" onclick="openAssetModal(\''+a.id+'\')">Bearbeiten</button></div></div>';
  });
  html+='</div>';
  root.innerHTML=html;
}

function populateTypeSelects(){
  const used=[...new Set([...TYPES, ...state.assets.map(a=>a.type).filter(Boolean)])];
  ["tlType","aType"].forEach(id=>{
    const sel=document.getElementById(id); const cur=sel.value;
    sel.innerHTML='<option value="">Alle Typen</option>'+used.map(t=>'<option>'+esc(t)+'</option>').join("");
    sel.value=cur;
  });
}

/* ============================================================
   MODALS
   ============================================================ */
const overlay=document.getElementById("overlay");
const modal=document.getElementById("modal");
function closeModal(){ overlay.classList.remove("show"); modal.innerHTML=""; }
overlay.addEventListener("click",e=>{ if(e.target===overlay) closeModal(); });
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeModal(); });

/* ---------- Gerät ---------- */
function openAssetModal(id){
  const a = id? assetById(id) : null;
  const color = a? a.color : PALETTE[state.assets.length%PALETTE.length];
  modal.innerHTML=`
    <div class="modal-head"><h2>${a?"Gerät bearbeiten":"Neues Gerät / Fahrzeug"}</h2>
      <button class="close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <label class="f">Bezeichnung <span class="req">*</span>
        <input class="control" id="aName" placeholder="z. B. LKW MAN TGS / Bagger CAT 308" value="${a?esc(a.name):''}"></label>
      <div class="grid-2">
        <label class="f">Typ
          <select class="control" id="aTypeSel">${TYPES.map(t=>'<option'+((a&&a.type===t)?' selected':'')+'>'+t+'</option>').join("")}</select></label>
        <label class="f">Kennung / Inventar-Nr.
          <input class="control" id="aIdent" placeholder="z. B. R-BSB 123 / Inv. 04" value="${a?esc(a.identifier||''):''}"></label>
      </div>
      <label class="f">Farbe im Zeitstrahl
        <div class="swatches" id="aSwatches">${PALETTE.map(c=>'<button type="button" data-c="'+c+'" style="background:'+c+'" aria-pressed="'+(c===color)+'"></button>').join("")}</div></label>
      <label class="f">Notiz
        <textarea class="control" id="aNote" placeholder="optional – z. B. Anhängerkupplung, max. Reichweite, Wartung fällig">${a?esc(a.note||''):''}</textarea></label>
      <label class="f" style="flex-direction:row;align-items:center;gap:8px">
        <input type="checkbox" id="aActive" ${(!a||a.active!==false)?'checked':''} style="width:auto"> Aktiv (im Zeitstrahl anzeigen)</label>
    </div>
    <div class="modal-foot">
      ${a?'<button class="btn danger" onclick="deleteAsset(\''+a.id+'\')">Löschen</button>':''}
      <div class="spacer" style="flex:1"></div>
      <button class="btn" onclick="closeModal()">Abbrechen</button>
      <button class="btn primary" onclick="saveAsset('${a?a.id:''}')">Speichern</button>
    </div>`;
  overlay.classList.add("show");
  modal.querySelector("#aSwatches").addEventListener("click",e=>{
    const b=e.target.closest("button[data-c]"); if(!b) return;
    modal.querySelectorAll("#aSwatches button").forEach(x=>x.setAttribute("aria-pressed","false"));
    b.setAttribute("aria-pressed","true");
  });
  setTimeout(()=>modal.querySelector("#aName").focus(),30);
}
function saveAsset(id){
  const name=modal.querySelector("#aName").value.trim();
  if(!name){ toast("Bitte eine Bezeichnung angeben.","err"); return; }
  const color=(modal.querySelector('#aSwatches [aria-pressed="true"]')||{}).getAttribute? modal.querySelector('#aSwatches [aria-pressed="true"]').dataset.c : PALETTE[0];
  const obj={
    id: id||uid(), name,
    type: modal.querySelector("#aTypeSel").value,
    identifier: modal.querySelector("#aIdent").value.trim(),
    color, note: modal.querySelector("#aNote").value.trim(),
    active: modal.querySelector("#aActive").checked,
    updatedAt: now()
  };
  if(id){ const i=state.assets.findIndex(a=>a.id===id); state.assets[i]=obj; }
  else state.assets.push(obj);
  closeModal(); toast(id?"Gerät aktualisiert":"Gerät angelegt","ok"); save();
}
function deleteAsset(id){
  const bk=state.bookings.filter(b=>b.assetId===id).length;
  if(!confirm("Gerät wirklich löschen?"+(bk?(" Es bestehen "+bk+" Einsätze, die ebenfalls entfernt werden."):""))) return;
  state.bookings.filter(b=>b.assetId===id).forEach(b=> state.tombstones.push({id:b.id,deletedAt:now()}));
  state.bookings=state.bookings.filter(b=>b.assetId!==id);
  state.assets=state.assets.filter(a=>a.id!==id);
  state.tombstones.push({id,deletedAt:now()});
  closeModal(); toast("Gerät gelöscht","ok"); save();
}

/* ---------- Einsatz ---------- */
function openBookingModal(id,preset){
  const b = id? state.bookings.find(x=>x.id===id) : null;
  const p = preset||{};
  if(state.assets.length===0){ toast("Bitte zuerst ein Gerät anlegen.","err"); openAssetModal(); return; }
  const selAsset = b? b.assetId : (p.assetId||state.assets[0].id);
  const isTimed = b? timed(b) : (p.timed!==undefined? p.timed : tl.mode==="intraday");
  const dStart = b? sd(b) : (p.start? p.start.slice(0,10) : todayStr());
  const dEnd   = b? ed(b) : (p.end? p.end.slice(0,10) : dStart);
  let tStart, tEnd;
  if(b && timed(b)){ tStart=b.start; tEnd=b.end; }
  else if(p.timed && p.start){ tStart=p.start; tEnd=p.end||p.start; }
  else { tStart=dStart+"T08:00"; tEnd=dStart+"T10:00"; }
  modal.innerHTML=`
    <div class="modal-head"><h2>${b?"Einsatz bearbeiten":"Neuer Einsatz"}</h2>
      <button class="close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <label class="f">Gerät / Fahrzeug <span class="req">*</span>
        <select class="control" id="bAsset">${state.assets.map(a=>'<option value="'+a.id+'"'+(a.id===selAsset?' selected':'')+'>'+esc(a.name)+(a.type?' ('+esc(a.type)+')':'')+'</option>').join("")}</select></label>
      <label class="f">Verwendungsort / Ziel / Baustelle <span class="req">*</span>
        <input class="control" id="bLoc" placeholder="z. B. BV Untere Bachgasse 8 / Fahrt Kieswerk → Baustelle" value="${b?esc(b.location):''}"></label>
      <div class="seg modal-seg" id="bModeSeg">
        <button type="button" data-m="day" aria-pressed="${!isTimed}">Ganztägig</button>
        <button type="button" data-m="time" aria-pressed="${isTimed}">Mit Uhrzeit</button>
      </div>
      <div id="bDayFields" class="grid-2"${isTimed?' style="display:none"':''}>
        <label class="f">Von <span class="req">*</span><input type="date" class="control" id="bStart" value="${dStart}"></label>
        <label class="f">Bis <span class="req">*</span><input type="date" class="control" id="bEnd" value="${dEnd}"></label>
      </div>
      <div id="bTimeFields"${isTimed?'':' style="display:none"'}>
        <div class="grid-2">
          <label class="f">Beginn <span class="req">*</span><input type="datetime-local" class="control" id="bStartDT" value="${tStart}"></label>
          <label class="f">Ende <span class="req">*</span><input type="datetime-local" class="control" id="bEndDT" value="${tEnd}"></label>
        </div>
        <div class="quick-dur" id="bQuickDur"><span>Dauer ab Beginn:</span>
          <button type="button" data-min="30">30 Min</button>
          <button type="button" data-min="60">1 Std</button>
          <button type="button" data-min="120">2 Std</button>
          <button type="button" data-min="240">4 Std</button>
          <button type="button" data-min="480">8 Std</button>
        </div>
      </div>
      <label class="f">Verantwortlich / Fahrer
        <input class="control" id="bResp" placeholder="z. B. Polier, Fahrername" value="${b?esc(b.responsible||''):''}"></label>
      <label class="f">Notiz
        <textarea class="control" id="bNote" placeholder="optional – z. B. Ladung, Tour, Auftrag">${b?esc(b.note||''):''}</textarea></label>
      <div id="bConflict"></div>
    </div>
    <div class="modal-foot">
      ${b?'<button class="btn danger" onclick="deleteBooking(\''+b.id+'\')">Löschen</button>':''}
      <div class="spacer" style="flex:1"></div>
      <button class="btn" onclick="closeModal()">Abbrechen</button>
      <button class="btn primary" onclick="saveBooking('${b?b.id:''}')">Speichern</button>
    </div>`;
  overlay.classList.add("show");
  const check=()=>checkBookingConflict(id);
  modal.querySelector("#bModeSeg").addEventListener("click",e=>{
    const btn=e.target.closest("button[data-m]"); if(!btn) return;
    const toTime=btn.dataset.m==="time";
    modal.querySelectorAll("#bModeSeg button").forEach(x=>x.setAttribute("aria-pressed", x===btn?"true":"false"));
    if(toTime){ const ds=modal.querySelector("#bStart").value||todayStr(), de=modal.querySelector("#bEnd").value||ds;
      if(!modal.querySelector("#bStartDT").value) modal.querySelector("#bStartDT").value=ds+"T08:00";
      if(!modal.querySelector("#bEndDT").value) modal.querySelector("#bEndDT").value=de+"T10:00"; }
    else { const dt=modal.querySelector("#bStartDT").value;
      if(dt){ modal.querySelector("#bStart").value=dt.slice(0,10);
        modal.querySelector("#bEnd").value=(modal.querySelector("#bEndDT").value||dt).slice(0,10); } }
    modal.querySelector("#bDayFields").style.display=toTime?"none":"";
    modal.querySelector("#bTimeFields").style.display=toTime?"":"none";
    check();
  });
  modal.querySelector("#bQuickDur").addEventListener("click",e=>{
    const btn=e.target.closest("button[data-min]"); if(!btn) return;
    const sv=modal.querySelector("#bStartDT").value; if(!sv) return;
    const end=new Date(new Date(sv).getTime()+parseInt(btn.dataset.min,10)*60000);
    modal.querySelector("#bEndDT").value=toISO(end)+"T"+pad2(end.getHours())+":"+pad2(end.getMinutes());
    check();
  });
  ["bAsset","bStart","bEnd","bStartDT","bEndDT"].forEach(f=>{ const el=modal.querySelector("#"+f); if(el) el.addEventListener("change",check); });
  check();
  setTimeout(()=>modal.querySelector("#bLoc").focus(),30);
}
function modalRange(){
  const mode=modal.querySelector('#bModeSeg [aria-pressed="true"]').dataset.m;
  if(mode==="day"){ const s=modal.querySelector("#bStart").value, e=modal.querySelector("#bEnd").value;
    return {mode,start:s,end:e,sMs:s?fromISO(s).getTime():NaN,eMs:e?fromISO(e).getTime()+86400000:NaN}; }
  const s=modal.querySelector("#bStartDT").value, e=modal.querySelector("#bEndDT").value;
  return {mode,start:s,end:e,sMs:s?new Date(s).getTime():NaN,eMs:e?new Date(e).getTime():NaN};
}
function checkBookingConflict(id){
  const box=modal.querySelector("#bConflict"); if(!box) return;
  const assetId=modal.querySelector("#bAsset").value;
  const r=modalRange();
  if(isNaN(r.sMs)||isNaN(r.eMs)||r.eMs<=r.sMs){
    box.innerHTML='<div class="conflict-note"><span>⚠</span><span>'+(r.mode==="day"?"Das Enddatum darf nicht vor dem Startdatum liegen.":"Das Ende muss nach dem Beginn liegen.")+'</span></div>'; return; }
  const clash=state.bookings.filter(o=>o.id!==id && o.assetId===assetId && startMs(o)<r.eMs && r.sMs<endMs(o));
  if(clash.length){ const a=assetById(assetId);
    box.innerHTML='<div class="conflict-note"><span>⚠</span><span><b>Doppelbelegung:</b> '+esc(a?a.name:"")+' ist in diesem Zeitraum bereits verplant – '
      + clash.map(c=>esc(c.location)+' ('+fmtRange(c)+')').join(", ")+'. Du kannst trotzdem speichern.</span></div>';
  } else box.innerHTML='';
}
function saveBooking(id){
  const assetId=modal.querySelector("#bAsset").value;
  const location=modal.querySelector("#bLoc").value.trim();
  if(!location){ toast("Bitte einen Verwendungsort / ein Ziel angeben.","err"); return; }
  const r=modalRange();
  if(!r.start||!r.end){ toast("Bitte Zeitraum angeben.","err"); return; }
  if(isNaN(r.sMs)||isNaN(r.eMs)||r.eMs<=r.sMs){ toast(r.mode==="day"?"Enddatum liegt vor dem Startdatum.":"Ende liegt vor dem Beginn.","err"); return; }
  const obj={ id:id||uid(), assetId, location,
    responsible: modal.querySelector("#bResp").value.trim(),
    note: modal.querySelector("#bNote").value.trim(),
    start:r.start, end:r.end, allDay:(r.mode==="day"), updatedAt: now() };
  if(id){ const i=state.bookings.findIndex(b=>b.id===id); state.bookings[i]=obj; }
  else state.bookings.push(obj);
  closeModal(); toast(id?"Einsatz aktualisiert":"Einsatz angelegt","ok"); save();
}
function deleteBooking(id){
  if(!confirm("Diesen Einsatz wirklich löschen?")) return;
  state.bookings=state.bookings.filter(b=>b.id!==id);
  state.tombstones.push({id,deletedAt:now()});
  closeModal(); toast("Einsatz gelöscht","ok"); save();
}

/* ---------- GitHub-Einstellungen ---------- */
function openSettings(){
  modal.innerHTML=`
    <div class="modal-head"><h2>GitHub-Verbindung</h2><button class="close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="hint">Alle Daten werden in <b>einer JSON-Datei in deinem GitHub-Repo</b> gespeichert – so sehen alle Geräte denselben Stand.</div>
      <div class="grid-2">
        <label class="f">Benutzer / Organisation <span class="req">*</span>
          <input class="control" id="cOwner" placeholder="rustikalopal" value="${esc(cfg.owner)}"></label>
        <label class="f">Repository <span class="req">*</span>
          <input class="control" id="cRepo" placeholder="bsb-tracking-daten" value="${esc(cfg.repo)}"></label>
      </div>
      <div class="grid-2">
        <label class="f">Datei-Pfad
          <input class="control" id="cPath" value="${esc(cfg.path)}"></label>
        <label class="f">Branch
          <input class="control" id="cBranch" value="${esc(cfg.branch)}"></label>
      </div>
      <label class="f">Personal Access Token <span class="req">*</span>
        <input class="control" id="cToken" type="password" placeholder="${cfg.token?'•••••••• (gespeichert)':'github_pat_…'}" value=""></label>
      <div class="hint">Fine-grained Token mit Berechtigung <span class="kbd">Contents: Read and write</span> nur für dieses Repo.
        <a href="https://github.com/settings/personal-access-tokens/new" target="_blank" rel="noopener">Token erstellen →</a></div>
      <details><summary style="cursor:pointer;font-size:12.5px;color:var(--steel);font-weight:600">Einrichtung Schritt für Schritt</summary>
        <ol class="steps" style="margin-top:10px">
          <li>Privates Repo anlegen (z. B. <span class="kbd">bsb-tracking-daten</span>) – hier liegen nur die Einsatzdaten.</li>
          <li>Fine-grained Token erstellen, Repository-Zugriff auf genau dieses Repo, Permission <span class="kbd">Contents: read/write</span>.</li>
          <li>Felder oben ausfüllen, Token einfügen, <b>Verbinden &amp; laden</b>.</li>
          <li>Die Datei wird beim ersten Speichern automatisch angelegt.</li>
        </ol>
      </details>
      <div class="hint" style="border-top:1px solid var(--line-2);padding-top:10px">
        <b>Hinweis:</b> Der Token wird nur in diesem Browser gespeichert (nicht im Code, nicht öffentlich). Auf einem geteilten Lager-Rechner entsprechend bedenken.</div>
    </div>
    <div class="modal-foot">
      ${cfg.token?'<button class="btn danger" onclick="disconnect()">Trennen</button>':''}
      <div class="spacer" style="flex:1"></div>
      <button class="btn" onclick="closeModal()">Schließen</button>
      <button class="btn primary" id="cConnect">Verbinden &amp; laden</button>
    </div>`;
  overlay.classList.add("show");
  modal.querySelector("#cConnect").addEventListener("click", async ()=>{
    cfg.owner=modal.querySelector("#cOwner").value.trim();
    cfg.repo=modal.querySelector("#cRepo").value.trim();
    cfg.path=modal.querySelector("#cPath").value.trim()||"daten/bsb-tracking.json";
    cfg.branch=modal.querySelector("#cBranch").value.trim()||"main";
    const tk=modal.querySelector("#cToken").value.trim();
    if(tk) cfg.token=tk;
    if(!isConfigured()){ toast("Bitte Benutzer, Repository und Token ausfüllen.","err"); return; }
    saveConfig();
    const btn=modal.querySelector("#cConnect"); btn.disabled=true; btn.textContent="Verbinde …";
    await pull();
    btn.disabled=false; btn.textContent="Verbinden & laden";
    if(connected){ toast("Verbunden – "+state.assets.length+" Geräte, "+state.bookings.length+" Einsätze","ok"); closeModal(); }
  });
}
function disconnect(){
  if(!confirm("Token aus diesem Browser entfernen? Die Daten in GitHub bleiben erhalten.")) return;
  cfg.token=""; saveConfig(); connected=false; setSync("off","Nicht verbunden");
  closeModal(); toast("Getrennt","ok");
}

/* ---------- Toast ---------- */
let toastT;
function toast(msg,kind){
  const t=document.getElementById("toast");
  t.className="toast"+(kind?" "+kind:""); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"), kind==="err"?4200:2400);
}

/* ============================================================
   EVENTS / INIT
   ============================================================ */
document.getElementById("tabs").addEventListener("click",e=>{
  const b=e.target.closest("button[data-view]"); if(!b) return;
  document.querySelectorAll("#tabs button").forEach(x=>x.setAttribute("aria-selected", x===b?"true":"false"));
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
  document.getElementById("view-"+b.dataset.view).classList.add("active");
});
document.getElementById("settingsBtn").onclick=openSettings;
document.getElementById("bannerConnect").onclick=openSettings;
document.getElementById("syncBtn").onclick=()=>{ if(isConfigured()) pull(); else openSettings(); };
document.getElementById("addAssetBtn").onclick=()=>openAssetModal();
document.getElementById("addAssetBtn2").onclick=()=>openAssetModal();
document.getElementById("addBookingBtn").onclick=()=>openBookingModal();
document.getElementById("addBookingBtn2").onclick=()=>openBookingModal();

document.getElementById("navPrev").onclick=()=>{ tl.start=addDays(tl.start, tl.mode==="intraday"?-1:-Math.round(tl.days/2)); document.getElementById("timeline")._scrolled=false; renderTimeline(); };
document.getElementById("navNext").onclick=()=>{ tl.start=addDays(tl.start, tl.mode==="intraday"?1:Math.round(tl.days/2)); document.getElementById("timeline")._scrolled=false; renderTimeline(); };
document.getElementById("navToday").onclick=()=>{ tl.start=startOfDay(tl.mode==="intraday"?new Date():addDays(new Date(),-3)); document.getElementById("timeline")._scrolled=false; renderTimeline(); };
document.getElementById("rangeSeg").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b) return;
  document.querySelectorAll("#rangeSeg button").forEach(x=>x.setAttribute("aria-pressed", x===b?"true":"false"));
  if(b.dataset.mode==="intraday"){ tl.mode="intraday"; tl.start=startOfDay(new Date()); }
  else { tl.mode="days"; tl.days=parseInt(b.dataset.days,10); }
  document.getElementById("timeline")._scrolled=false; renderTimeline();
});
document.getElementById("bookingFilter").addEventListener("click",e=>{
  const b=e.target.closest("button[data-f]"); if(!b) return;
  document.querySelectorAll("#bookingFilter button").forEach(x=>x.setAttribute("aria-pressed", x===b?"true":"false"));
  ui.bFilter=b.dataset.f; renderBookings();
});
document.getElementById("tlSearch").addEventListener("input",e=>{ ui.tlSearch=e.target.value; renderTimeline(); });
document.getElementById("tlType").addEventListener("change",e=>{ ui.tlType=e.target.value; renderTimeline(); });
document.getElementById("bSearch").addEventListener("input",e=>{ ui.bSearch=e.target.value; renderBookings(); });
document.getElementById("aSearch").addEventListener("input",e=>{ ui.aSearch=e.target.value; renderAssets(); });
document.getElementById("aType").addEventListener("change",e=>{ ui.aType=e.target.value; renderAssets(); });

// Bei Rückkehr zum Tab aktuellen Stand holen (Multi-Device)
window.addEventListener("focus",()=>{ if(isConfigured() && Date.now()-lastPull>8000 && !saving) pull(true); });

function init(){
  loadConfig();
  renderAll();
  updateBanner();
  if(isConfigured()){ setSync("loading","Lädt …"); pull(); }
  else { setSync("off","Nicht verbunden"); }
}
init();
</script>
</body>
</html>
